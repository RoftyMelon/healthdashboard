<meta charset="utf-8">
<!-- minimum-scale pins iOS: switching back to the wide markers table from a narrow page
     otherwise re-runs Safari's fit-to-width and zooms the whole page out -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- iOS Safari's data detectors auto-link anything that smells like a date, duration or
     phone number and render it blue. "4mo", "2.3y" and 4-digit values all qualify. Off. -->
<meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
<!-- Without this Safari tints its toolbar with a default (white). Kept in sync with the
     theme by paint(), because the toggle overrides the OS preference. -->
<meta name="theme-color" content="#FFFFFF">
<!-- Add to Home Screen -> runs standalone: no address bar, no bottom toolbar, full screen.
     The only way to be rid of Safari's chrome, since its collapse gesture can't be forced. -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Blood panel">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" href="./icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* :root[data-theme=dark], not bare [data-theme=dark]: the light block below is `:root,...`
   — equal specificity, later in the file, so a bare attribute selector LOSES the tie and
   dark can never apply. The :root prefix outranks it; light stays the no-JS default. */
:root[data-theme=dark]{
  --chrome:#262624;
  /* Claude dark: warm near-black grey, never a cold blue-black */
  --bg:#262624;
  --txt:#F5F4EF; --t2:rgba(245,244,239,.62); --t3:rgba(245,244,239,.42); --t4:rgba(245,244,239,.26);
  --line:rgba(245,244,239,.13); --line2:rgba(245,244,239,.075);
  --ok:#52C07E; --watch:#E5A34A; --out:#F0705F; --info:#7FB3F0;
  --stick:#262624; --head:#30302E;
  --hov:rgba(127,179,240,.10); --hovs:#2B3239; --grp:#2F2F2C; --sel:#7FB3F0;
  --band:rgba(245,244,239,.16);
  --btn:#30302E; --btn-b:rgba(245,244,239,.14); --btn-h:#3B3B37;
  --sol:#F5F4EF; --sol-t:#262624;
  --mg:rgba(245,244,239,.07);
  --frost:rgba(48,48,46,.72); --frost-b:rgba(245,244,239,.14); --frost-h:rgba(59,59,55,.9);
  --glass:rgba(48,48,46,.08); --glass-b:rgba(245,244,239,.14);
}
:root{--thh:30px; --nm:180px; --hh:64px}   /* sizing: theme-independent, must not sit in a theme block */
/* TYPE SCALE — one rationale across every tab:
   26 page title (.pgh — caps card titles gain ~40% optical size, so the title
   needs real distance to LOOK biggest) · 14 card/session title (.ccard>b), 12.5 .cgrp ·
   16 body & controls (content rows, page-intro .lead notes, subtitles, tabs,
   names, search) · 15 secondary (doses, caveat notes, links, 14.5 filter chips) · 14 caps
   section labels (.pgst/.cgrp) + hints · ~13 micro data (hour marks, kg,
   supplement pills, counts, column heads) · 11.5 absolute floor (chart
   bracket/axis micro-labels only). Mobile may step ONE notch down for density
   (names 15, table group titles 14.5, page title 24) and never below the floor.
   Zoom is disabled: sizes stand alone. */
:root,[data-theme=light]{--chrome:#FFFFFF;   /* pre-compensates Safari's darkening; see paint() */
  
  /* Claude cream: warm ivory paper, warm near-black ink */
  --bg:#FAF9F5;
  --txt:#1F1E1D; --t2:rgba(31,30,29,.64); --t3:rgba(31,30,29,.45); --t4:rgba(31,30,29,.27);
  --line:rgba(31,30,29,.14); --line2:rgba(31,30,29,.08);
  --ok:#146B45; --watch:#9C5B0D; --out:#B23B30; --info:#3D6AA8;
  --stick:#FAF9F5; --head:#F0EEE6;
  --hov:rgba(61,106,168,.075); --hovs:#EDF0F6; --grp:#EFEDE3; --sel:#3D6AA8;
  --band:rgba(31,30,29,.16);
  --btn:#FFFFFF; --btn-b:rgba(31,30,29,.15); --btn-h:#F0EEE6;
  --sol:#1F1E1D; --sol-t:#FAF9F5;
  --mg:rgba(31,30,29,.08);
  --frost:rgba(250,249,245,.75); --frost-b:rgba(31,30,29,.14); --frost-h:rgba(250,249,245,.95);
  --glass:rgba(250,249,245,.08); --glass-b:rgba(255,255,255,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1;position:relative;
  min-height:100vh;min-height:100dvh}   /* dvh tracks Safari's collapsing bottom bar */
/* Theme flip: colours crossfade in place. The orbit is excluded, or this shorthand
   would replace its transition list and kill the 850ms transform. */
html.tfade,html.tfade *:not(.orbit-disc):not(.icon-moon):not(.icon-sun),
html.tfade *::before,html.tfade *::after{
  transition:background-color .22s ease,color .22s ease,border-color .22s ease,
             fill .22s ease,stroke .22s ease !important}
.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 20px 110px}
.topbar{position:fixed;top:0;left:0;width:100%;z-index:50;background:var(--bg);
  padding:8px var(--gut,20px) 0;   /* tab row on top (auto-hides on scroll), pills + category
                                      below; 8px is the standard minimum comfortable inset */
  touch-action:pan-y;   /* a horizontal pan anywhere on the bar must NEVER scroll the table —
                           the scrollers below re-allow their own horizontal panning */
  transition:border-color .2s ease;border-bottom:.5px solid transparent}
.topspacer{height:var(--toph,112px)}   /* fixed takes it out of flow; hold its place */
.topbar.stuck{border-bottom-color:var(--line)}

button{font-family:inherit;font-size:15px;font-weight:550;letter-spacing:-.005em;
  padding:9px 15px;border-radius:11px;cursor:pointer;transition:.18s cubic-bezier(.3,.9,.3,1);
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--txt)}
button:hover{background:var(--btn-h)}
button.ic{padding:0;width:40px;height:40px;border-radius:50%;flex:none;position:relative;top:-2px;
  /* top:-4 lifts the circle level with the tab TEXT — the active-tab underline drags the row's
     geometric centre down, so plain vertical-centre reads ~4px low. relative (not transform) keeps the glass. */
  display:flex;align-items:center;justify-content:center;color:var(--t2);
  background:var(--glass);border:.5px solid var(--glass-b);z-index:1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 1px 6px rgba(0,0,0,.08);
  -webkit-backdrop-filter:blur(2.5px) saturate(1.4);backdrop-filter:blur(2.5px) saturate(1.4)}
button.ic:hover{color:var(--txt)}

/* Orbit toggle. The clip circle IS the horizon: icons exist only inside it.
   The disc pivots BELOW the window (50% 104%), so they rise and set on a shallow
   arc rather than popping straight up. The sun layer is pre-rotated 180deg, so it
   waits on the far side. Each click adds +180deg, always the same direction. */
.orbit{position:relative;width:100%;height:100%;display:block;
  -webkit-clip-path:circle(50%);clip-path:circle(50%)}
.orbit-disc{position:absolute;inset:0;transform-origin:50% 104%}
.orbit-layer{position:absolute;inset:0}
.orbit-layer.sun-side{transform:rotate(180deg);transform-origin:50% 104%}
.icon-moon{position:absolute;left:calc(50% - 10px);top:calc(50% - 10px)}
.icon-sun{position:absolute;left:calc(50% - 12px);top:calc(50% - 12px)}
.orbit-disc,.icon-moon,.icon-sun{transition:transform .85s cubic-bezier(.55,.05,.22,1)}
button:focus-visible{outline:2px solid var(--info);outline-offset:2px}

td.boot{padding:60px 24px;text-align:center;line-height:1.8;color:var(--txt);font-size:17px}
td.boot span{color:var(--t3);font-size:15px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.topline{display:flex;align-items:flex-start;gap:10px}
.bar{flex:1;min-width:0;display:flex;gap:6px;row-gap:2px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.chips{display:contents}
/* -5px lines the first link's LABEL up with the hamburger glyph above it: the 28px glyph
   sits centered in its 40px box (6px inset from the gutter), the label at -5px + 12px pad ≈ 7px.
   flex-basis:100% pins the toc to its OWN flex line — otherwise the packing math is free to
   squeeze it inline and wrap the pills instead. */
.swap,.ptabs,.toc{touch-action:pan-x pan-y;overscroll-behavior-x:contain}
.toc{display:flex;gap:2px;min-width:0;flex-basis:100%;   /* pill BOXES align to the gutter */
  padding-top:10px;margin-top:-12px;   /* the scroll surface covers the seam above:
     a horizontal pan between the rows must grab a SCROLLER, never the table */
  flex-wrap:nowrap;overflow-x:auto;                 /* never wrap: scroll instead */
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.toc::-webkit-scrollbar{display:none}
.nav{flex:none}
.srch{display:flex;align-items:center;flex:none;width:36px;height:36px;border-radius:99px;overflow:hidden;
  background:var(--btn);border:.5px solid var(--btn-b);
  transition:width .3s cubic-bezier(.2,.9,.25,1),border-color .16s}
.srch.open{width:210px;border-color:var(--txt)}
.srch .sicon{flex:none;width:34px;height:34px; display:flex;align-items:center;justify-content:center;
  padding:0;border:none;background:none;border-radius:50%;color:var(--t3)}
.srch .sicon:hover{background:none;color:var(--txt)}
.srch.open .sicon{color:var(--t2);cursor:default}
.srch input{flex:1;min-width:0;height:100%;padding:0;border:none;background:none;border-radius:0;outline:none;
  font-family:inherit;font-size:16px;font-weight:450;color:var(--txt);
  opacity:0;transition:opacity .16s ease .1s}
.srch.open input{opacity:1}
.srch input::placeholder{color:var(--t3)}
.srch input:focus-visible{outline:none}
.srch .qx{display:none;flex:none;width:26px;height:26px;margin-right:5px;padding:0;line-height:24px;
  text-align:center;font-size:20px;font-weight:400;border:none;background:none;border-radius:50%;color:var(--t3)}
.srch .qx:hover{background:var(--btn-h);color:var(--txt)}
.srch.has .qx{display:block}
.chip{font-family:inherit;font-size:13.5px;font-weight:520;padding:7px 12px;border-radius:99px;cursor:pointer;
  flex:none;white-space:nowrap;   /* scroll past the row's edge, never shrink or wrap */
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--t2);transition:.16s}
.chip:hover{background:var(--btn-h);color:var(--txt)}
.chip[aria-pressed=true]{background:var(--sol);color:var(--sol-t);border-color:transparent;font-weight:600}
.cn{font-size:12.5px;font-weight:700;margin-left:6px;opacity:.45;font-variant-numeric:tabular-nums}
.cn.hot{color:var(--out);opacity:1}
.chip[aria-pressed=true] .cn{color:inherit;opacity:.55}

/* table */

table{border-collapse:separate;border-spacing:0;table-layout:fixed;width:100%;min-width:1130px}
thead th{position:sticky;top:var(--hvis,70px);z-index:8;background:var(--head);
  font-size:12.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);
  height:var(--thh);padding:0 10px;vertical-align:middle;
  text-align:right;white-space:nowrap;border-bottom:.5px solid var(--line)}
thead th.lft{text-align:left}
/* Frozen block: identity + current value + unit. Everything to its right scrolls.
   With table-layout:fixed these widths are REAL, so the sticky offsets can trust them. */
th.nm,td.nm,th.now,td.now,th.uc,td.uc{position:sticky;z-index:2;background:var(--stick)}
th.nm,td.nm{left:var(--gut,20px);text-align:left;width:var(--nm)}
th.now,td.now{left:calc(var(--gut,20px) + var(--nm));width:68px}
thead th.now{padding:0 5px}   /* 'LATEST' is the only thing keeping this column wide */
th.uc,td.uc{left:calc(var(--gut,20px) + var(--nm) + 68px);width:62px;
  border-right:1.5px solid var(--line)}
th.lc,td.lc{width:52px}
th.off,td.off{width:150px}
th.pos,td.pos{width:170px}
th.tr,td.tr{min-width:104px}   /* no width: absorbs the leftover */
thead th.nm,thead th.now,thead th.uc{background:var(--head);z-index:9}
thead th.now{color:var(--txt)}
tr.grp td{position:sticky;top:calc(var(--hvis,70px) + var(--thh) - 3px);z-index:6;padding:0;
  background:var(--grp);
  border-top:.5px solid var(--line);border-bottom:.5px solid var(--line)}
tr.grp .ghd{position:sticky;left:var(--gut,20px);width:fit-content;text-align:left;
  padding:9px 10px 10px;
  display:flex;align-items:baseline;gap:11px;white-space:nowrap}
tr.grp .gt{font-size:15.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  /* µ uppercases to Greek Mu, which looks like M. Units must never be case-mapped. */
  color:var(--txt);line-height:1.25}
.gtx{text-transform:none}   /* supplement group titles carry DOSES: exempt from the uppercase */
tr.grp .gs{font-size:13.5px;font-weight:450;letter-spacing:0;color:var(--t4);line-height:1.35}

td.tr{text-align:left;padding-left:14px}
.trw{display:flex;align-items:baseline;gap:7px}
.dlt{font-size:15.5px;font-weight:600;color:var(--t2);font-variant-numeric:tabular-nums;
  white-space:nowrap;letter-spacing:-.01em}
.tsp{font-size:12.5px;color:var(--t4);white-space:nowrap;font-variant-numeric:tabular-nums}
.tnil{color:var(--t4)}

/* expanded chart: x-axis IS the draw columns above it */
tr.det>td{padding:0;border-bottom:.5px solid var(--line)}
.dwrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .34s cubic-bezier(.25,.9,.3,1)}
.dwrap.open{grid-template-rows:1fr}
.dclip{overflow:hidden;min-height:0;background:var(--grp);
  box-shadow:inset 3px 0 0 var(--sel)}
.chart{display:flex;height:200px;padding:22px 0 18px;opacity:0;transition:opacity .2s ease}
.dwrap.open .chart{opacity:1}
.cy{flex:none;position:relative;color:var(--t3)}
.cyl{position:absolute;right:14px;height:0;display:flex;align-items:center;justify-content:flex-end}
.cyl span{font-size:13px;font-variant-numeric:tabular-nums;background:var(--grp);padding:0 5px;
  transform:translateY(-.5px)}
.cyl.o span{color:var(--ok);font-weight:600}
.cyu{position:absolute;right:14px;top:-7px;font-size:13px;font-weight:500;color:var(--t4)}
.ckey{position:absolute;right:48px;top:0;bottom:0;display:flex;gap:14px}
.cka{position:relative;flex:none}
.cka.ref{width:34px}
.cka.opt{width:64px}
/* each bracket spans its own range at the plot's y-scale, so reference NESTS around optimal */
.ckt{position:absolute;right:0;display:flex;align-items:center;gap:8px}
.ckbr{flex:none;width:8px;align-self:stretch;border:1px solid var(--t4);
  border-right:none;border-radius:3px 0 0 3px}
.ckbr.opt{border-color:color-mix(in srgb,var(--ok) 70%,transparent)}
/* vertical, reading bottom-to-top, like a y-axis title. The numbers are on the axis already. */
.ckl{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;
  /* In vertical-rl, flex 'column' runs along the BLOCK axis (the two columns), and
     align-items centres along the INLINE axis, which is the vertical one. */
  display:flex;flex-direction:column;align-items:center;gap:10px;
  font-size:14.5px;font-weight:600;color:var(--txt);letter-spacing:.01em}
/* horizontal, and centred on the bracket's span: it sits INSIDE the range it qualifies */
/* rides in the vertical flow, below the label. Logical properties, because in
   vertical-rl the inline axis IS the vertical one. */
.ckl em{font-style:normal;font-size:11.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t3);border:.5px solid var(--line);border-radius:4px;
  padding-inline:7px;padding-block:2px}
/* visual weight tracks evidential weight. No status colour borrowed:
   green/amber/red mean things about your blood, never about my confidence. */
.ckl em.strong{color:var(--t2);border-color:var(--t3);border-width:1px}
.ckl em.weak{color:var(--t4);border-style:dashed}
.cy::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:var(--line)}
.cplot{flex:1;position:relative}
.cplot svg{position:absolute;inset:0;width:100%;height:100%;color:var(--t2);overflow:visible}
.cb{position:absolute;left:0;right:0}
.cb.clin{background:var(--band)}
.cb.opt{background:var(--ok);opacity:.22}
.cgl{position:absolute;left:0;right:0;height:0;border-top:.5px dashed var(--line)}
.cgl.o{border-top-color:color-mix(in srgb,var(--ok) 45%,transparent)}
.cd{position:absolute;width:9px;height:9px;border-radius:50%;transform:translate(-50%,50%);
  border:2px solid var(--grp)}
.cd.ok{background:var(--ok)} .cd.watch{background:var(--watch)} .cd.out{background:var(--out)}
.cpad{flex:none}
@media(prefers-reduced-motion:reduce){.dwrap{grid-template-rows:1fr}.chart{opacity:1}}
tbody td{padding:9px 10px;font-size:15.5px;text-align:right;white-space:nowrap;color:var(--t2);
  border-bottom:.5px solid var(--line2);font-variant-numeric:tabular-nums}
tr.m{cursor:pointer;transition:background .14s}
tr.m:hover td{background:var(--hov)}
tr.m:hover td.now,tr.m:hover td.uc{background:var(--hovs)}
tr.m:hover td.nm{background:linear-gradient(90deg,var(--sel) 0,var(--sel) 3px,var(--hovs) 3px)}
td.nm{font-size:16px;font-weight:560;color:var(--txt);letter-spacing:-.01em;overflow:hidden}
td.nm .n1{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.nm .fr{font-size:12.5px;font-weight:400;color:var(--t4);display:block;margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0}
td.uc{text-align:left;padding-left:7px;font-size:14px;color:var(--t3);
  white-space:nowrap;font-variant-numeric:tabular-nums}
/* SI/US switch, in the Unit column's own header — the units it governs sit directly
   beneath it. It shows BOTH systems with the active one solid, so it reads as a two-state
   switch at a glance. The first version printed only the current unit at the same size,
   weight and colour as the column headings beside it, which made it indistinguishable
   from one; a segmented pill cannot be mistaken for a <th> label. */
.ubt{position:relative;appearance:none;cursor:pointer;padding:2px;
  display:inline-flex;align-items:center;gap:1px;
  border-radius:99px;background:var(--btn);border:.5px solid var(--btn-b);
  font-family:inherit;line-height:1;transition:.16s}
.ubt b{font-size:10px;font-weight:600;letter-spacing:.04em;padding:3px 5px;
  border-radius:99px;color:var(--t4);transition:.16s}
.ubt b.on{background:var(--sol);color:var(--sol-t)}
.ubt:hover{border-color:var(--sel)}
/* the pill is deliberately small; this grows the TAP target without shifting any layout */
.ubt::after{content:'';position:absolute;inset:-11px -8px}
thead th.uc{padding:0 4px}   /* the segmented pill needs the width the 10px default ate */
td.lc{text-align:left;padding-left:10px;white-space:nowrap}
.lm{font-size:14px;font-weight:500;color:var(--t2);font-variant-numeric:tabular-nums}
.lm.old{color:var(--info);font-weight:650}
.nilx{color:var(--t4)}
td.c{font-size:15px;color:var(--t3);text-align:center;padding:9px 4px}
th.dcol{text-align:center;width:64px;padding:0 4px;letter-spacing:.05em}
td.c.has{color:var(--t2)}
td.c.ok{color:var(--ok)}td.c.watch{color:var(--watch)}td.c.out{color:var(--out);font-weight:600}
td.nil{color:var(--t4)}
td.now{white-space:nowrap;padding-right:4px}
td.dnow,th.dnow{font-weight:700;color:var(--txt)}

/* current pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:10px;
  font-size:16px;font-weight:650;letter-spacing:-.015em;font-variant-numeric:tabular-nums;
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--txt)}
.pill.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent);
  border-color:color-mix(in srgb,var(--ok) 32%,transparent)}
.pill.watch{color:var(--watch);background:color-mix(in srgb,var(--watch) 12%,transparent);
  border-color:color-mix(in srgb,var(--watch) 32%,transparent)}
.pill.out{color:var(--out);background:color-mix(in srgb,var(--out) 14%,transparent);
  border-color:color-mix(in srgb,var(--out) 38%,transparent);}
td.off{text-align:left;padding-left:16px;white-space:nowrap}
.exc{font-size:15px;font-weight:600;white-space:nowrap;letter-spacing:-.01em}
.exc em{font-style:normal;font-weight:500;opacity:.62;font-size:13.5px}
.exc.out{color:var(--out)} .exc.watch{color:var(--watch)}

/* THE INLINE GAUGE */
td.pos{padding-right:14px}
.mg{position:relative;height:9px;border-radius:5px;background:var(--mg)}
.mgc{position:absolute;top:0;height:9px;border-radius:5px;background:var(--band)}
.mgo{position:absolute;top:0;height:9px;border-radius:5px;background:var(--ok);opacity:.72}
.mgt{position:absolute;top:-3.5px;width:3px;height:16px;border-radius:2px;transform:translateX(-1.5px);
  background:var(--txt);transition:left .6s cubic-bezier(.2,.85,.25,1)}
.mgt.ok{background:var(--ok);}
.mgt.watch{background:var(--watch);}
.mgt.out{background:var(--out);width:3.5px}
.mgx{position:relative;height:11px;margin-top:5px}
.mgx span{position:absolute;font-size:11.5px;color:var(--t4);font-variant-numeric:tabular-nums;white-space:nowrap}
.mgx span.o{color:var(--ok);font-weight:600}

.gutmask{position:fixed;top:0;left:0;width:var(--gut,20px);height:100%;
  background:var(--bg);z-index:7;pointer-events:none}
.top{position:fixed;right:26px;bottom:calc(26px + env(safe-area-inset-bottom));z-index:40;width:44px;height:44px;padding:0;
  display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;
  background:color-mix(in srgb,var(--glass),transparent 55%);border:.5px solid var(--glass-b);color:var(--t2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 1px 4px rgba(0,0,0,.05);
  -webkit-backdrop-filter:blur(1px) saturate(1.4);backdrop-filter:blur(1px) saturate(1.4);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .22s ease,transform .22s cubic-bezier(.2,.9,.25,1),color .14s,background .14s}
.top.on{opacity:1;pointer-events:auto;transform:none}
.top:hover{color:var(--txt)}

/* the categories navigate, they do not filter */
.nav{font-family:inherit;font-size:15px;font-weight:500;padding:5px 12px;border-radius:99px;cursor:pointer;
  background:none;border:.5px solid transparent;color:var(--t3);transition:.14s}
.nav:hover{background:var(--btn);border-color:var(--btn-b);color:var(--txt);transform:none}

/* ---- pages: a pinned tab row that auto-hides on scroll — MARKERS PAGE ONLY — and the data pages ----
   The tab strip lives in its OWN row at the top of the bar (with the theme toggle), ABOVE the
   filter/group pills, PERSISTENT on every page — no hamburger. Pills FILTER the table; tabs
   NAVIGATE pages. ON MARKERS ONLY the scroll handler adds html.tabhid on scroll-down (removes it
   on scroll-up / near-top); other pages never get the class, so the row stays put there. The row
   collapses to nothing (opacity:0 cascades to the abs-positioned toggle too, hiding it with the
   row). --toph (measured) holds the FULL header height so the content spacer never jumps; --hvis
   tracks the CURRENTLY visible header bottom — what the frozen thead sticks under — so it follows
   the collapse (setStick/pumpStick drive it; --hvis NOT --stick, which is a colour token). */
.tabrow{display:flex;align-items:center;gap:10px;overflow:hidden;max-height:64px;margin-bottom:-1px;
  transition:max-height .16s cubic-bezier(.3,.7,.2,1),margin-bottom .16s cubic-bezier(.3,.7,.2,1),opacity .12s ease}
html.tabhid .tabrow{max-height:0;opacity:0;margin-bottom:0;pointer-events:none}
.ptabs{flex:1;min-width:0;display:flex;align-items:center;gap:2px;position:relative;
  flex-wrap:nowrap;overflow-x:auto;                /* never wrap: scroll, like the toc */
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ptabs::-webkit-scrollbar{display:none}
/* .swap now wraps just the search + filter pills (search opening scrolls the pills). */
.swap{display:flex;align-items:center;gap:inherit;flex:1;min-width:0;
  flex-wrap:nowrap;overflow-x:auto;                /* search opens -> pills scroll, never wrap */
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.swap::-webkit-scrollbar{display:none}
.pt{font-family:inherit;font-size:17px;font-weight:550;padding:9px 13px;white-space:nowrap;
  background:none;border:none;border-radius:9px;color:var(--t3);cursor:pointer;position:relative;
  letter-spacing:-.005em;transition:color .14s}
.pt:hover{color:var(--txt)}
.pt.on{color:var(--txt);font-weight:700}
/* ONE shared underline slides between tabs (pseudo-elements can't animate across
   buttons). movePtu() positions it from the active tab; it lives in the scroller's
   content so it rides along when the strip scrolls. */
.ptu{position:absolute;bottom:3px;height:2px;border-radius:2px;background:var(--sol);
  left:0;width:0;transition:left .3s cubic-bezier(.3,.7,.2,1),width .3s cubic-bezier(.3,.7,.2,1)}
/* off the markers page, everything table-flavoured folds away — the tab row stays */
html:not([data-page=markers]) .srch,html:not([data-page=markers]) .chips,
html:not([data-page=markers]) .toc,
html:not([data-page=markers]) .shell,html:not([data-page=markers]) .gutmask{display:none}

.pgs{max-width:790px;padding:0 0 40px}   /* no left inset: it made content 10px right of centre AND, since cards size off 100vw, tipped them into horizontal overflow — content sits symmetric in the wrap gutter instead */
.pgh{font-size:26px;font-weight:700;letter-spacing:-.02em;margin:2px 0 3px}
.pgsub{font-size:16px;color:var(--t3)}
.pgsp{padding-top:8px}   /* a subtitle sitting under a bordered .pgst needs its own air */
.pgst.mini{font-size:12.5px}                       /* footnote-grade section */
.srow.lite{padding:7px 0}
.srow.lite .sn{font-size:15px;font-weight:450;color:var(--t2);flex:1;min-width:0}
/* THE MEASURE RULE: rules and rows hug their CONTENT, never the 780px container.
   Text-list sections (stack rows, diet meals, section headers) cap at 620px, so
   separators end near the text and right-anchored links stay near the names. */
.pgsec{margin-top:22px;max-width:430px}   /* stack rows are short: name + dose + tip */
.pgsec.dfoods{max-width:none;padding:0 14px}   /* untimed Diet foods: full-width like the (stretched) meal cards + their 14px side padding, so the tips share the cards' (i) column */
.pgsec.stk{max-width:none}   /* stack sections: full width, edge to edge (dose flushes to the far right) */
.pgsec.stk .pgst{max-width:135px;white-space:nowrap}   /* underline caps at the longest title ("MAY ADD LATER" ~130px), not full width */
.ndlist .srow{align-items:flex-start}
.ndlist .sn{flex:0 0 43%;min-width:0}
.ndlist .frn{flex:1;min-width:0;color:var(--t3);font-size:14px;line-height:1.45;user-select:text}
.ndhead{display:flex;gap:10px;padding:0 0 7px;border-bottom:.5px solid var(--line)}
.ndhead .sn,.ndhead .frn{font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t4)}
.frcopy{margin-top:8px;font-size:13px;padding:5px 13px;border-radius:7px;border:.5px solid var(--line);background:transparent;color:var(--t2);cursor:pointer;min-width:130px;text-align:center}
.frcopy:hover{background:var(--btn-h);color:var(--txt)}
.pgsec.nohead{margin-top:0}   /* a headerless section CONTINUES the one above it */
/* section titles uppercase like the table's group bars — doses NEVER go through this (µ -> M) */
.pgst{font-size:14px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--info);max-width:620px;
  padding:7px 0;border-bottom:.5px solid var(--line);display:flex;align-items:baseline;gap:9px}
.pgst small{font-weight:500;letter-spacing:0;font-size:13.5px;color:var(--t4);text-transform:none}
.srow{display:flex;align-items:baseline;gap:10px;padding:10px 0;border-bottom:.5px solid var(--line2);flex-wrap:wrap;position:relative}
.srow.off .sn{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--t4);text-decoration-thickness:1px}
.sn{font-size:16px;font-weight:560;color:var(--txt);letter-spacing:-.01em}
.srow.on:not(.lite) .sn::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-left:8px;vertical-align:middle}   /* 'on now' dot — sits after the name */
.sd{font-size:15px;color:var(--t2);font-variant-numeric:tabular-nums;text-align:right}
.sfill{flex:1}
.sbuy{flex:none;width:14px;text-align:center;font-size:11px;color:var(--t4);text-decoration:none;align-self:center}
a.sbuy:hover{color:var(--info)}
.sjudge{flex-basis:100%;margin-top:2px;font-size:12.5px;line-height:1.5;color:var(--t3)}   /* per-item readout: how you'll judge a trial */
.sjudge .sjl{color:var(--t2);font-weight:600}
/* routine: an hour ruler — empty hours stay visible so the day reads as TIME */
.rhr{display:flex;gap:14px;position:relative}   /* anchors the full-width boundary lines */
.pgsub+.rhr{margin-top:18px}   /* the ruler breathes below the header (the old cards carried this gap) */
.rht{flex:none;width:64px;font-size:13px;font-weight:600;color:var(--t4);
  font-variant-numeric:tabular-nums;letter-spacing:.02em}
/* calendar convention: a label anchors at the TOP of its cell and marks the hour's
   START; only block boundaries draw a line. Every hour is exactly --hh tall. */
.rhl{display:flex;align-items:flex-start;gap:6px;height:var(--hh);white-space:nowrap}
/* a boundary line runs from a clear step past the label to the row's right edge.
   It positions against .rhr at the first label's line — safe because the hour-walk
   guarantees a boundary hour always STARTS its row. The tabular HH:00 ends ~31px;
   left:0 would strike THROUGH it. */
.rhl.lt::after{content:"";position:absolute;left:44px;top:7px;height:.5px;
  width:min(calc(100% - 44px),300px);background:var(--t4);opacity:.55}
  /* 300px fits the widest row, "10min run, sunlight, hot/cold shower" (~288px). MAGIC NUMBER: re-measure if you add a longer routine line. */
/* every row centres its content between the boundary lines of its span. UNIFORM
   HEIGHT IS THE CONTRACT: the padding must leave a 2-line row (07:00) and a
   two-event hour (17:00, 21:00) fitting inside one --hh cell — a row that
   stretches breaks the ruler silently. */
.rcell{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:12px 0 0}
/* stacked point-pairs share the EXACT geometry of the sub-hour span pairs:
   absolute revs, text centres at 22px and 53px of the cell, no row stretch */
.rhr.multi:not(.rprop) .rcell{position:relative;padding:0}
.rhr.multi:not(.rprop) .rev{position:absolute;left:0;right:0;padding:0;top:10px}
.rhr.multi:not(.rprop) .rev+.rev{top:41px}
.rhr.multi:not(.rprop):has(+.rlast) .rev{top:9px}   /* the evening trio rides 1px higher as a unit */
.rhr.multi:not(.rprop):has(+.rlast) .rev+.rev{top:36px}   /* before the terminal row:
   centre the middle moment between its neighbours (equal 27px gaps) */
/* sub-hour rows: events sit at their real minutes; hairlines cut the fractions */
.rhr.rprop .rcell{position:relative;padding:0}
.rhr.rprop .rev{position:absolute;left:0;right:0;padding:0}
.rln{position:absolute;left:44px;width:min(calc(100% - 44px),300px);height:.5px;
  background:var(--t4);opacity:.55}
/* blocks need no rule of their own: the base .rcell centres every row vertically,
   and align-items is left at stretch so ALL text shares the same left edge.
   (A legacy row-direction align-items:center here turned into HORIZONTAL centring
   when .rcell went flex-direction:column — blocks drifted to the middle.) */
/* the day's LAST hour is a terminal point, not a span: its text sits ON the line
   beside the label, and the row carries no empty hour below it */
.rhr.rlast .rhl{height:auto;line-height:24px}   /* match the content's 16px/1.5 line box: BASELINES level */
.rhr.rlast .rcell{justify-content:flex-start;padding-top:0}
.rhr.rlast .rev{padding-top:0;position:relative;top:-1px}   /* rides with the trio above it */
.rev{display:flex;gap:12px;align-items:baseline;padding:2px 0}
.rbody{min-width:0}
.rdo{font-size:16px;color:var(--t2);line-height:1.5}
/* a category's own caveat, straight from the data */
.cnote{font-size:15px;color:var(--t4);font-style:italic;line-height:1.55;padding:8px 2px 2px}
/* lead: an intro note under a page's section header is CONTENT, not a footnote —
   body size, readable contrast, upright. The clamp keeps EVERY sentence on one
   line on any phone: divisor 26 = the longest lead line in em ("Striving for 3
   sessions…"), 46px = page padding; wide screens just get the 16px cap. */
.cnote.lead{font-size:clamp(12px,calc((100vw - 46px)/26),16px);color:var(--t2);font-style:normal}
.cnote.lead+.pgst{margin-top:16px}   /* air before the section that follows an intro note */
/* cards sit NEXT TO each other and the row slides sideways when they overflow.
   The row BREAKS OUT of the page's 780px prose measure: it grows to its content,
   clamped to the viewport (minus the content gutters) — so a wide desktop shows
   every card and a phone still gets the same scrolling row. */
.care{display:flex;flex-wrap:nowrap;gap:14px;margin:14px 0 26px;
  width:max-content;max-width:calc(100vw - var(--gut,20px) - 20px);
  overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.care::-webkit-scrollbar{display:none}
.ccard{flex:0 0 clamp(250px,82vw,310px);background:var(--grp);border-radius:12px;padding:11px 14px 12px;position:relative}
/* muscle-group sub-headers: a quiet caps overline — always SMALLER than the
   exercise names they label, or the labels read as the content */
.cgrp{font-size:12.5px;font-weight:700;letter-spacing:.1em;color:var(--info);text-transform:uppercase;
  padding:10px 0 1px}
/* the info tip: a small circled i, details unfold below on tap */
.infob{display:inline-flex;width:18px;height:18px;margin-left:6px;border-radius:50%;flex:none;
  align-items:center;justify-content:center;background:none;border:1px solid var(--t4);
  color:var(--t3);font-size:12px;font-style:italic;font-weight:700;cursor:pointer;
  vertical-align:middle;margin-top:-2px;padding:0;font-family:Georgia,serif}
.infob:hover{background:var(--btn-h)}
/* stack rows wrap the tip in .tipw — a fixed slot on the right so the tips align
   into a column; the bubble anchors to the icon and opens to its LEFT on hover */
.srow .tipw{flex:none;width:18px;justify-content:center;align-self:center;position:relative;display:inline-flex}
.tipw .infob{margin:0}
.tipw .exinfo{top:50%;left:auto;right:calc(100% + 8px);transform:translateY(-50%);
  width:max-content;max-width:230px}
.tipw:hover .exinfo{display:block}
/* base bubble: a compact popover tucked into the TOP-RIGHT CORNER of its anchor —
   used by the exercise/care cards (.ccard is position:relative). Stack tips
   override this via .tipw .exinfo to open leftward beside their icon. */
.exinfo{display:none;pointer-events:none;position:absolute;z-index:6;top:6px;right:6px;
  width:max-content;max-width:min(66%,200px);
  background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 11px 9px;
  font-size:13.5px;color:var(--t2);line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.16)}
.exn:hover+.exinfo,.infob:hover+.exinfo{display:block}
.infob.pin+.exinfo{display:block;pointer-events:auto}   /* click-pinned: persists past hover, and is selectable */
.exinfo.tbl{width:min(94vw,340px);max-width:min(94vw,340px);padding:8px 11px 9px}
.ntab{columns:2;column-gap:15px;font-size:11px;line-height:1.38}
.nsecw{break-inside:avoid}
.nsec{font-weight:700;font-size:10.5px;letter-spacing:.02em;color:var(--t3);padding:6px 0 2px}
.nsecw:first-child .nsec{padding-top:0}
.nrow{display:flex;gap:8px;align-items:baseline}
.nrow .nlab{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.nrow .nval{color:var(--txt);white-space:nowrap;font-variant-numeric:tabular-nums}
.nrow .npct{color:var(--t4);font-size:10px;margin-left:4px;font-variant-numeric:tabular-nums}
/* the gridless set table: a column per set, weight over reps, tabular and quiet */
/* name left, spec right: the "40kg - 3x5" column aligns down the card edge */
.exn{line-height:1.3;font-weight:520;display:flex;align-items:baseline;gap:6px}
.exnm{flex:1;min-width:0}
/* the spec is a fixed micro-ledger: weight right-aligned | dash | sets x reps —
   constant total width, so every kg, dash and x shares a vertical down the card */
.exkg{display:inline-grid;grid-template-columns:42px 12px 42px;
  font-size:13px;font-weight:450;color:var(--t2);font-variant-numeric:tabular-nums;white-space:nowrap}
.exkg .k{text-align:right}
.exkg .d{text-align:center;color:var(--t4)}
.exkg .r{text-align:left}
/* an EMPTY first cell (bodyweight rows) exports no baseline, so the grid aligns by
   its bottom edge and the spec rides high. A zero-width space restores the baseline. */
.exkg .k:empty::before,.exkg .d:empty::before{content:"\200b"}
.exsets{display:flex;flex-wrap:wrap;gap:1px 4px;margin:1px 0 0}
.exset{display:flex;flex-direction:column;align-items:center;min-width:26px;padding:0 2px}
.exset i{font-style:normal;font-size:13px;color:var(--t2);font-variant-numeric:tabular-nums;line-height:1.2}
.exset b{font-size:14.5px;font-weight:650;color:var(--txt);font-variant-numeric:tabular-nums;line-height:1.2}
/* >b : the title is the card's DIRECT child. A bare `.ccard b` swallows every <b>
   in the card — all set numbers and kg/reps legends rendered at title size */
.ccard>b{font-size:14px;font-weight:750;letter-spacing:.06em;color:var(--txt);text-transform:uppercase}
.ccard ul{margin:4px 0 8px;padding:0;list-style:none}
.ccard ul:last-child{margin-bottom:0}
.ccard li{font-size:16px;color:var(--txt);line-height:1.45;padding:2px 0;border-bottom:.5px solid var(--line2)}
.ccard li.drow{display:flex;align-items:baseline;position:relative}
.drow .dfn{flex:1;min-width:0}
.drow .damt{flex:none;margin-left:8px;font-size:12.5px;color:var(--t3);font-variant-numeric:tabular-nums;white-space:nowrap}
.drow .dkcal{flex:none;margin-left:10px;font-size:12.5px;color:var(--t4);font-variant-numeric:tabular-nums;white-space:nowrap}
.ccard li.drow:last-child{border-bottom:.5px solid var(--line2)}   /* the last food in a meal keeps its line, closing the list before Supplements */
.drow .exinfo,.srow.lite .exinfo{top:calc(100% + 4px);left:0;right:auto}   /* Diet food tips drop BELOW their own row, not the card corner */
.ccard li:last-child{border-bottom:none}
.ccard li.crs{padding:0;height:9px;border-bottom:none}   /* a "---" item = course gap */
.cempty{font-size:15px;color:var(--t4);padding:8px 0 2px}
/* diet */
.cwhen{margin-left:8px;font-size:13px;font-weight:450;color:var(--t4);font-variant-numeric:tabular-nums}
.ckcal{margin-left:8px;font-size:12.5px;font-weight:450;color:var(--t3);font-variant-numeric:tabular-nums}
.care.col{flex-direction:column;overflow:visible;width:auto;max-width:none}
.care.wide{margin-top:34px;width:auto;max-width:none}   /* air above; fill the width (mobile) instead of hugging one 344px card */
/* The dental card is sized to ITS OWN content, never padded out to match the day-grid
   beside it — and the width is chosen to control WHERE the long line wraps.
   Measured, at this font: "Alternate thread floss & interdental brushes" = 316px,
   "Carbamide peroxide 10-15% - 2x/year," = 284px, and that same line plus "applied" =
   341px. So a content width in [316,341) keeps the floss line whole while breaking the
   carbamide line after the comma:
       Carbamide peroxide 10-15% - 2x/year,
       applied with custom dental tray
   356px = 328px content + the card's 2x14px padding, i.e. the middle of that window, so
   font-rendering drift on another device can't tip it either way. Re-measure if the text
   changes: below 344 the floss line breaks, at 370+ "applied" climbs back up. */
.care.wide .ccard{flex:0 1 auto;width:min(356px,100%)}
.care.col .ccard{flex:none;width:min(430px,100%)}   /* wide enough that no item wraps */
.dnotes{margin-top:26px;padding:13px 16px 15px;background:var(--grp);border-radius:12px}
.dnotes b{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--t3)}
.dnotes ul{margin:6px 0 0;padding:0;list-style:none}
.dnotes li{font-size:15px;color:var(--t2);line-height:1.7}
/* face schedule — a CARE .schedule renders as a day-indexed weekly dot-matrix, not a card.
   solid dot = applied, faint = skipped, accent = the procedure. All colours are theme tokens. */
.cgrid{background:var(--grp);border-radius:12px;padding:12px 15px 13px;width:max-content;max-width:640px;margin-top:22px}
.cgrid>b{font-size:14px;font-weight:750;letter-spacing:.06em;color:var(--info);text-transform:uppercase}   /* SKINCARE title in accent blue */
.care.wide .ccard>b{color:var(--info)}   /* DENTAL title blue too — scoped to grooming, leaves Training/Diet card titles alone */
.care.wide .cgrp{color:var(--t3)}   /* grooming DAILY/YEARLY muted grey to match the skincare section labels (Morning/etc.) */
.cgscroll{overflow-x:auto;scrollbar-width:none}   /* the whole face card pans as one unit on phones */
.cgscroll::-webkit-scrollbar{display:none}   /* swipe-driven, no bar (cf .care) */
.cggrid{--cgn:7;display:grid;grid-template-columns:max-content repeat(var(--cgn,7),50px);
  align-items:center;row-gap:3px;font-size:12.5px;margin-top:11px}   /* label auto-fits any font size; fixed 42px days.
  Same at every width — the card sizes to this and pans in .cgscroll only when it can't fit. --cgn overridden inline */
.cgcell{display:flex;justify-content:center;align-items:center}
.cgrn{color:var(--txt);white-space:nowrap;line-height:1.3;font-size:16px;padding-right:13px}   /* a row name — and the header's empty corner */
.cgd{color:var(--t2);font-size:13px}
.cgtag{display:inline-flex;flex-direction:column;align-items:center;line-height:1.15;
  background:var(--bg);border:.5px solid var(--line);border-radius:6px;padding:3px 6px;color:var(--t2);font-size:13px}
.cgtag em{font-style:normal;font-size:11px;color:var(--t3)}
.cgtag.hi{background:var(--hov);border-color:transparent;color:var(--sel)}   /* the needle day */
.cgtag.hi em{color:var(--sel)}
.cgsec{grid-column:1/-1;display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t3);letter-spacing:.03em;
  padding:12px 0 7px;border-top:.5px solid var(--line);margin-top:7px}
.cgi{width:13px;height:13px;flex:none}   /* section-header icon (sun / sunset / moon), inherits the label's grey via currentColor */
.cgsec.first{border-top:none;margin-top:0;padding-top:3px}   /* first section sits under the day row, no divider */
.cgdot{width:9px;height:9px;border-radius:50%;background:var(--txt)}
.cgdot.off{width:2.5px;height:2.5px;background:var(--t4)}   /* skipped: a faint whisper, not blank */
.cgdot.hi{width:11px;height:11px;background:var(--sel)}   /* the microneedle, the week's one procedure */
.cgnote{font-size:11.5px;color:var(--t3);line-height:1.55;margin-top:13px;border-top:.5px solid var(--line);padding-top:10px}
.cgnote~.cgnote{border-top:none;margin-top:3px;padding-top:0}   /* stacked notes: only the first carries the divider */

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
  .orbit-disc,.icon-moon,.icon-sun{transition:none!important}
  html.tfade,html.tfade *{transition:none!important}}

/* ---- Media queries LAST: they add no specificity, so a later base rule would win. ---- */
/* A landscape phone is 393px TALL. The toolbar is position:fixed, so every pixel it
   keeps is a pixel of data you never see. Trigger on short screens too, not just narrow. */
@media(max-width:900px),(max-height:560px){

<script>
// ---- DATA LIVES IN bloodwork.json ----
// One source of truth. The dashboard reads it; so does any AI you hand it to.
// To add a draw, edit that file. Never edit data in here.
let MARK=[],DECS=[],CATS=[],DATA={draws:[]},STACK=null,ROUTINE=[],DIET=null,CARE=[],TRAINING=null,NEXTDRAW=null;

// Accent-folding, so "hemoglobine" finds "Hémoglobine". NFKD splits the accent off the
// letter; the range then strips it. œ/æ have no decomposition, so they're folded by hand.
const norm=s=>s.toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
  .replace(/œ/g,'oe').replace(/æ/g,'ae');

const TKEY='bloodpanel.theme',UKEY='bloodpanel.units';
// S.draws is filled AFTER the fetch — it can't reference DATA at declaration time any more.
// S.units: 'us' (canonical) | 'si' — which unit system the TABLE READS in. Default 'us'
// because that is what every marker's canonical unit and reference ranges are expressed in.
let S={draws:[],theme:'light',units:'us'},filter='all',q='',qRaw='',openRow=null;

// u is a unit LABEL ("mg/L"), not an index — an AI can't silently fat-finger a string the
// way it can an integer. Numbers still work, for anything written the old way.
const unitOf=(m,u)=>(typeof u==='number'?m.units[u]:m.units.find(x=>x.l===u))||m.units[0];
const toUS=(m,r,u)=>{const x=unitOf(m,u);
  return x.a!==undefined?x.a*r+x.b:r*x.m;};

/* READING UNIT — display only, never comparison.
   Values are stored as the lab PRINTED them ({r,u}); toUS() normalises each to the
   marker's CANONICAL unit (its units[] entry with m:1). Everything that COMPARES —
   status(), sev(), the gauge bands, the chart's geometry — keeps working in canonical
   units. The toggle converts at the point of FORMATTING only, so a converted number is
   never measured against an unconverted range. Convert one and you must convert them
   all: a cell in mmol/L beside a range in mg/dL reads as a false out-of-range. */

const siOf=m=>(m.units||[]).find(u=>SIU.test(u.l))||null;

const invU=(u,v)=>u.a!==undefined?(v-u.b)/u.a:v/u.m;   // inverse of toUS, one unit
const uLab=m=>{const u=rdU(m);return u?u.l:m.us;};

  return u&&v!=null&&!isNaN(v)?invU(u,v):v;};
const dD=(m,d)=>{const u=rdU(m);                   // a DIFFERENCE: slope only, no offset
  return u?(u.a!==undefined?d/u.a:d/u.m):d;};      // (matters for a1c's affine IFCC unit)

  if(m.opt&&(v<m.opt[0]||v>m.opt[1]))return'watch';return'ok';}

function latest(m){const c=chron().filter(d=>d.v[m.id]);if(!c.length)return null;
  const d=c[c.length-1];return{d,v:toUS(m,d.v[m.id].r,d.v[m.id].u),raw:d.v[m.id]};}
const NOW=new Date(),STALE=18;
const ago=mo=>mo<1?'<1mo':mo<12?mo+'mo':(Math.round(mo/12*10)/10)+'y';
const months=ds=>{const d=new Date(ds+'T00:00:00');
  return (NOW.getFullYear()-d.getFullYear())*12+(NOW.getMonth()-d.getMonth());};

      if(typeof v.r!=='number'||!isFinite(v.r))

      if(!cids.has(s.cat))bad.push(`STACK "${s.name}": category "${s.cat}" is not in STACK.cats`);
      if(!ST.includes(s.status))bad.push(`STACK "${s.name}": status "${s.status}" is not one of ${ST.join('/')}`);

      if(s.url!=null&&!/^https:\/\//.test(s.url))bad.push(`STACK "${s.name}": url must start with https://`);
      if(s.ev!=null&&!['strong','moderate','weak'].includes(s.ev))bad.push(`STACK "${s.name}": ev "${s.ev}" is not strong/moderate/weak`);
      if(s.judge!=null&&typeof s.judge!=='string')bad.push(`STACK "${s.name}": judge must be a string`);
    });
  }
  if(j.NEXTDRAW){
    if(!Array.isArray(j.NEXTDRAW.items))bad.push('NEXTDRAW.items must be an array (empty is fine)');
    else j.NEXTDRAW.items.forEach(x=>{if(typeof x!=='object'||!x.en||!x.fr)bad.push('NEXTDRAW items must be {en, fr}');});
  }
  if(j.ROUTINE){
    let prev='';
    j.ROUTINE.forEach(r=>{
      if(!/^\d{2}:\d{2}$/.test(r.t))bad.push(`ROUTINE "${r.do}": time "${r.t}" is not HH:MM`);
      else{if(r.t<=prev)bad.push(`ROUTINE "${r.t} ${r.do}": times must be ascending`);prev=r.t;}
      if(r.until!=null&&(!/^\d{2}:\d{2}$/.test(r.until)||r.until<=r.t))
        bad.push(`ROUTINE "${r.do}": until "${r.until}" must be HH:MM and later than ${r.t}`);
    });

  if(j.DIET)(j.DIET.meals||[]).forEach(m=>{

    else m.items.forEach(it=>{if(typeof it!=='string'&&!(it&&typeof it.n==='string'))bad.push(`DIET "${m.t}": item must be a string or {n, info}`);});

      const sc=c.schedule, days=(Array.isArray(sc.days)?sc.days:[]).map(d=>d&&d.d);
      if(!days.length)bad.push(`CARE "${c.t}": schedule needs a days array`);
      if(!Array.isArray(sc.sections)||!sc.sections.length)bad.push(`CARE "${c.t}": schedule needs sections`);
      else sc.sections.forEach(s=>{
        if(!Array.isArray(s.rows)||!s.rows.length){bad.push(`CARE "${c.t}" / "${s.t}": section needs rows`);return;}
        s.rows.forEach(r=>{
          if(!r||!r.n){bad.push(`CARE "${c.t}": a schedule row needs a name`);return;}
          if(!Array.isArray(r.on))bad.push(`CARE "${c.t}" / "${r.n}": on must be an array of day names`);
          else r.on.forEach(d=>{if(!days.includes(d))bad.push(`CARE "${c.t}" / "${r.n}": on-day "${d}" is not in schedule.days`);});
        });
      });
    }
    else if(c.groups)c.groups.forEach(g=>{
      if(!Array.isArray(g.items)||!g.items.length)bad.push(`CARE "${c.t}" / "${g.t}": group needs items`);});

  });
  if(j.TRAINING)(j.TRAINING.cards||[]).forEach(c=>{
    if(c.groups)c.groups.forEach(g=>{
      if(!Array.isArray(g.items)||!g.items.length){bad.push(`TRAINING "${c.t}" / "${g.t}": group needs items`);return;}
      g.items.forEach(x=>{
        if(typeof x==='string')return;
        if(!x.n)bad.push(`TRAINING "${c.t}" / "${g.t}": exercise needs a name`);
        if(x.sets!=null&&(!Array.isArray(x.sets)||x.sets.some(s=>!Array.isArray(s)||s.length!==2)))
          bad.push(`TRAINING "${x.n}": sets must be [kg,reps] pairs`);
      });
    });
    else if(!Array.isArray(c.items))bad.push(`TRAINING "${c.t}": items must be an array (empty is fine)`);
  });
  return bad;
}

function boot(j,cache){
  const bad=audit(j);
  if(bad.length){
    document.getElementById('tbl').innerHTML=
      '<tbody><tr><td style="padding:40px 24px;line-height:1.9;color:var(--t2)">'+
      '<b style="color:var(--out);font-size:15px">'+bad.length+' problem'+(bad.length>1?'s':'')+' in bloodwork.js</b><br>'+
      '<span style="font-size:12px;color:var(--t3)">Fix these before trusting anything below.</span><br><br>'+
      bad.map(b=>'&bull; '+esc(b)).join('<br>')+'</td></tr></tbody>';
    return;                                   // refuse to render rather than render a lie
  }
  MARK=j.MARK; DECS=j.DECS; CATS=j.CATS; DATA=j.DATA;
  STACK=j.STACK||null; ROUTINE=j.ROUTINE||[]; DIET=j.DIET||null; CARE=j.CARE||[]; TRAINING=j.TRAINING||null; NEXTDRAW=j.NEXTDRAW||null;
  S.draws=DATA.draws;
  MARK.forEach(m=>m._h=norm(m.en+' '+m.fr+' '+m.us));   // search index, derived
  // Remember it, so opening from disk on a phone doesn't mean re-picking the file
  // every single time. Re-pick only when the data actually changes.
  if(cache!==false){try{localStorage.setItem(DKEY,JSON.stringify(j));}catch(e){}}
  paint(); render();
  if(page!=='markers')renderPage(page);   // re-booted (fresh file) while on a data page
}

// Opened from disk, fetch() is blocked. So offer the file instead: pick it or drop it.
// No server, no host, no account. The JSON is just a file you keep.
function askForFile(err){
  document.getElementById('tbl').innerHTML=
    '<tbody><tr><td id="dz" style="padding:56px 20px;text-align:center;line-height:1.75;color:var(--t2)">'+
    '<b style="color:var(--txt);font-size:16px">Open bloodwork.js</b><br>'+
    '<span style="font-size:13px">Pick it from wherever you keep it.</span><br><br>'+
    // big tap target: this is the whole interaction on a phone
    '<label style="display:inline-block;min-width:200px;padding:15px 26px;border-radius:99px;'+
    'background:var(--sol);color:var(--sol-t);cursor:pointer;font-size:14px;font-weight:600;'+
    '-webkit-tap-highlight-color:transparent">'+
    'Choose file<input id="pick" type="file" style="display:none"></label>'+
    '<br><br><span style="color:var(--t4);font-size:11.5px;line-height:1.6">'+
    'On a laptop, keeping bloodwork.js in this folder loads it automatically.<br>'+
    'iOS previews each file alone, so it has to be picked.</span></td></tr></tbody>';
  const take=async f=>{ if(!f) return;
    try{
      let t=await f.text();
      const i=t.indexOf('{');                       // tolerate the window.BLOODWORK = wrapper
      if(i>0) t=t.slice(i).replace(/;\s*$/,'');
      boot(JSON.parse(t));
    }catch(e){ alert('That file is not valid bloodwork data\n\n'+e); } };
  document.getElementById('pick').addEventListener('change',e=>take(e.target.files[0]));
  ['dragover','drop'].forEach(t=>document.addEventListener(t,e=>e.preventDefault()));
  document.addEventListener('drop',e=>take(e.dataTransfer&&e.dataTransfer.files[0]));
}

async function load(){
  // theme: the DEVICE's scheme is the default; a saved manual flip overrides it
  let saved=null;
  try{if(window.storage){const r=await window.storage.get(TKEY);
    if(r&&(r.value==='dark'||r.value==='light'))saved=r.value;}}catch(e){}
  // reading unit is a deliberate choice, so it only ever comes from storage — no OS analogue
  try{if(window.storage){const r=await window.storage.get(UKEY);
    if(r&&(r.value==='si'||r.value==='us'))S.units=r.value;}}catch(e){}
  const sys=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
  themeChosen=!!saved;
  S.theme=saved||(sys&&sys.matches?'dark':'light');
  if(sys&&sys.addEventListener)sys.addEventListener('change',e=>{   // live: follow the OS until flipped
    if(themeChosen)return;
    S.theme=e.matches?'dark':'light';paint();});
  paint();
  // 1. bloodwork.js sitting next to this file. Works from DISK — no server, no CORS,
  //    because <script src> is not subject to the fetch() same-origin rule.
  if(window.BLOODWORK) return boot(window.BLOODWORK);
  // 2. a sandbox that refused to load the sibling script (iOS Quick Look sometimes does)
  try{ const c=localStorage.getItem(DKEY); if(c) return boot(JSON.parse(c),false); }catch(e){}
  // 3. nothing worked: ask for the file
  askForFile();
}

/* inline position gauge: clinical band, optimal band, your value */
function mini(m){
  const [a0,a1]=m.axis,sp=a1-a0||1;
  const P=x=>Math.max(0,Math.min(100,((x-a0)/sp)*100));
  const cl=P(m.clin[0]),cw=P(m.clin[1])-cl;
  const ol=m.opt?P(m.opt[0]):0,ow=m.opt?P(m.opt[1])-ol:0;
  const L=latest(m);
  const tick=L?`<div class="mgt ${status(m,L.v)}" style="left:${P(L.v)}%"></div>`:'';
  const lab=(x,v)=>{const p=P(x);const tf=p<9?'none':p>91?'translateX(-100%)':'translateX(-50%)';
    return `<span style="left:${p}%;transform:${tf}">${fmt(v)}</span>`;};
  const tip=`Clinical ${fmt(dV(m,m.clin[0]))}–${fmt(dV(m,m.clin[1]))} ${uLab(m)}`+
    (m.opt?` · Optimal ${fmt(dV(m,m.opt[0]))}–${fmt(dV(m,m.opt[1]))} (${m.oc})`:'')+
    (L?` · You: ${fmt(dV(m,L.v))}`:' · not measured');
  return `<div title="${tip}">
    <div class="mg"><div class="mgc" style="left:${cl}%;width:${cw}%"></div>
      ${m.opt?`<div class="mgo" style="left:${ol}%;width:${ow}%"></div>`:''}${tick}</div>
    <div class="mgx">${lab(m.clin[0],dV(m,m.clin[0]))}${lab(m.clin[1],dV(m,m.clin[1]))}</div></div>`;
}
function sev(m,v){
  const w=(m.clin[1]-m.clin[0])||1;                       // normalise by the marker's own range width
  if(v<m.clin[0])return 100+(m.clin[0]-v)/w;              // so mg/dL and mL/min are comparable
  if(v>m.clin[1])return 100+(v-m.clin[1])/w;
  if(m.opt){ if(v<m.opt[0])return (m.opt[0]-v)/w; if(v>m.opt[1])return (v-m.opt[1])/w; }
  return 0;
}
function excursion(m,v){                    // how far past the edge, in the CURRENT reading unit
  // dD not dV: these are gaps, and a gap carries no zero-offset.
  if(v<m.clin[0])return `${fmt(dD(m,m.clin[0]-v))} under`;
  if(v>m.clin[1])return `${fmt(dD(m,v-m.clin[1]))} over`;
  if(m.opt){ if(v<m.opt[0])return `${fmt(dD(m,m.opt[0]-v))} below target`;
             if(v>m.opt[1])return `${fmt(dD(m,v-m.opt[1]))} above target`; }
  return '';
}
function trend(m){
  // latest vs the reading BEFORE it: "what moved since I last drew blood"
  const pts=chron().filter(d=>d.v[m.id]);
  if(pts.length<2)return '<span class="tnil">—</span>';
  const V=d=>toUS(m,d.v[m.id].r,d.v[m.id].u);
  const A=pts[pts.length-2],B=pts[pts.length-1],diff=V(B)-V(A);
  const yrs=(new Date(B.date+'T00:00:00')-new Date(A.date+'T00:00:00'))/31557600000;
  const lbl=Math.abs(diff)<1e-9?'no change':(diff>0?'↑':'↓')+' '+fmt(dD(m,Math.abs(diff)));
  const tip=`${fmt(dV(m,V(A)))} (${A.date}) → ${fmt(dV(m,V(B)))} (${B.date}) ${uLab(m)}`;
  return `<div class="trw" title="${tip}"><span class="dlt">${lbl}</span>`+
    `<span class="tsp">${yrs>=1?fmt(yrs)+'y':Math.round(yrs*12)+'mo'}</span></div>`;
}

// re-measure the open chart's panes against the CURRENT column positions
function fitChart(){
  const d=document.querySelector('tr.det'); if(!d)return;
  const cy=d.querySelector('.cy'),cp=d.querySelector('.cpad');
  const t=document.getElementById('tbl'),h=t.tHead?[...t.tHead.rows[0].cells]:[];
  if(!cy||!cp||!h.length)return;
  const n=chron().length,first=5+(filter==='flag'?1:0),last=first+n-1;
  if(!h[first]||!h[last])return;
  const tb=t.getBoundingClientRect();
  cy.style.width=(h[first].getBoundingClientRect().left-tb.left)+'px';
  cp.style.width=(tb.right-h[last].getBoundingClientRect().right)+'px';
}

function det(row,id,cols,n,tri){
  const cur=document.querySelector('tr.det');
  if(cur&&openRow===row){                                // toggle shut THIS row
    const w=cur.querySelector('.dwrap');openRow=null;
    if(!w){cur.remove();return;}
    w.classList.remove('open');
    let done=false;const kill=()=>{if(!done){done=true;cur.remove();}};
    w.addEventListener('transitionend',e=>{if(e.target===w&&e.propertyName==='grid-template-rows')kill();});
    setTimeout(kill,420); return;
  }
  if(cur)cur.remove();
  openRow=row;
  const m=MARK.find(x=>x.id===id),ds=chron();
  const V=d=>toUS(m,d.v[m.id].r,d.v[m.id].u);
  const pts=ds.map((d,i)=>({i,d})).filter(o=>o.d.v[m.id]);

  // Y-AXIS: the lab reference range, widened only enough to contain the data.
  const vals=pts.map(o=>V(o.d));
  let lo=Math.min(m.clin[0],...vals),hi=Math.max(m.clin[1],...vals);
  const pd=((hi-lo)||1)*.12; lo-=pd; hi+=pd;
  const P=v=>((v-lo)/(hi-lo))*100;                      // % up from the bottom
  const X=i=>((i+.5)/n)*100;                            // dead centre of each draw column

  // y labels: clinical bounds always; optimal only where it will not collide
  let L=[[m.clin[1],''],[m.clin[0],'']];
  if(m.opt)[m.opt[1],m.opt[0]].forEach(v=>{
    if(L.every(([w])=>Math.abs(P(v)-P(w))>7))L.push([v,'o']);});
  const ylab=L.map(([v,c])=>`<div class="cyl ${c}" style="bottom:${P(v).toFixed(2)}%"><span>${fmt(dV(m,v))}</span></div>`).join('');
  const grid=L.map(([v,c])=>`<div class="cgl ${c}" style="bottom:${P(v).toFixed(2)}%"></div>`).join('');
  const path=pts.map((o,k)=>`${k?'L':'M'}${X(o.i).toFixed(2)},${(100-P(V(o.d))).toFixed(2)}`).join(' ');
  const dots=pts.map(o=>`<div class="cd ${status(m,V(o.d))}" style="left:${X(o.i).toFixed(2)}%;bottom:${P(V(o.d)).toFixed(2)}%"`+
    ` title="${o.d.date} · ${fmt(dV(m,V(o.d)))} ${uLab(m)}"></div>`).join('');
  // measure, don't assume: column widths change with the viewport, so the panes must follow
  const _t=document.getElementById('tbl'),_h=_t.tHead?[..._t.tHead.rows[0].cells]:[];
  const _first=5+(tri?1:0), _last=_first+n-1;       // first and last draw column
  const _tb=_t.getBoundingClientRect();
  const preW=_h[_first]?(_h[_first].getBoundingClientRect().left-_tb.left):634;
  const padW=_h[_last] ?(_tb.right-_h[_last].getBoundingClientRect().right):104;

  const box=`<tr class="det"><td colspan="${cols}"><div class="dwrap"><div class="dclip">
    <div class="chart">
      <div class="cy" style="width:${preW}px">
        <div class="ckey">
          <div class="cka ref">
            <div class="ckt" style="bottom:${P(m.clin[0]).toFixed(2)}%;height:${(P(m.clin[1])-P(m.clin[0])).toFixed(2)}%">
              <span class="ckl">Lab reference range</span><span class="ckbr"></span></div>
          </div>
          ${m.opt?`<div class="cka opt">
            <div class="ckt" style="bottom:${P(m.opt[0]).toFixed(2)}%;height:${(P(m.opt[1])-P(m.opt[0])).toFixed(2)}%">
              <span class="ckl">Optimal target<em class="${m.oc}">${m.oc}</em></span><span class="ckbr opt"></span></div>
          </div>`:''}
        </div>
        <div class="cyu">${uLab(m)}</div>${ylab}</div>
      <div class="cplot">
        <div class="cb clin" style="bottom:${P(m.clin[0]).toFixed(2)}%;height:${(P(m.clin[1])-P(m.clin[0])).toFixed(2)}%"></div>
        ${m.opt?`<div class="cb opt" style="bottom:${P(m.opt[0]).toFixed(2)}%;height:${(P(m.opt[1])-P(m.opt[0])).toFixed(2)}%"></div>`:''}
        ${grid}
        ${pts.length>1?`<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${path}" fill="none"
          stroke="currentColor" stroke-width="1.6" vector-effect="non-scaling-stroke"
          stroke-linecap="round" stroke-linejoin="round" opacity=".8"/></svg>`:''}
        ${dots}
      </div>
      <div class="cpad" style="width:${padW}px"></div>
    </div></div></div></td></tr>`;
  row.insertAdjacentHTML('afterend',box);
  const w=row.nextElementSibling.querySelector('.dwrap');
  requestAnimationFrame(()=>w.classList.add('open'));
}

function pinTip(btn,e){e.stopPropagation();const on=btn.classList.contains('pin');document.querySelectorAll('.infob.pin').forEach(b=>b.classList.remove('pin'));if(!on)btn.classList.add('pin');}
document.addEventListener('click',e=>{if(!e.target.closest('.exinfo'))document.querySelectorAll('.infob.pin').forEach(b=>b.classList.remove('pin'));});
function copyNd(btn){
  const t=(NEXTDRAW.items||[]).map(x=>x.en+' — '+x.fr).join('\n');
  const flash=m=>{btn.textContent=m;clearTimeout(btn._t);btn._t=setTimeout(()=>{btn.textContent='Copy (EN + FR)';},1500);};
  const legacy=()=>{try{                                   // iOS / non-secure / rejected-promise fallback
    const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;
    ta.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;font-size:16px';
    document.body.appendChild(ta);
    if(/ipad|iphone|ipod/i.test(navigator.userAgent)){    // iOS needs an explicit Range + setSelectionRange
      const r=document.createRange();r.selectNodeContents(ta);
      const s=window.getSelection();s.removeAllRanges();s.addRange(r);ta.setSelectionRange(0,t.length);
    }else ta.select();
    const ok=document.execCommand('copy');document.body.removeChild(ta);
    flash(ok?'Copied ✓':'Copy failed');
  }catch(e){flash('Copy failed');}};
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(t).then(()=>flash('Copied ✓'),legacy);   // reject → legacy, never a bare dash
  else legacy();
}
function render(){
  const ds=chron(), n=ds.length;   // oldest -> newest: this row IS the chart's x-axis
  const cur={};MARK.forEach(m=>cur[m.id]=latest(m));
  const out=MARK.filter(m=>cur[m.id]&&status(m,cur[m.id].v)==='out');
  const wat=MARK.filter(m=>cur[m.id]&&status(m,cur[m.id].v)==='watch');
  const stl=MARK.filter(m=>cur[m.id]&&months(cur[m.id].d.date)>STALE);
  const nev=MARK.filter(m=>!cur[m.id]);
  const N={all:MARK.length,flag:out.length+wat.length,crit:DECS.length};   // the label says 'supplement', so count supplements
  document.getElementById('chips').innerHTML=
    [{id:'all',t:'All'},{id:'flag',t:'Flagged'},{id:'crit',t:'By supplement'}]
      .map(c=>`<button class="chip" aria-pressed="${filter===c.id&&!q}" onclick="setF('${c.id}')"`+
        (c.id==='flag'?` title="Outside the lab reference range, or outside the optimal target"`
         :c.id==='crit'?` title="${DECS.length} supplements, ${MARK.filter(m=>m.dec).length} markers between them"`:'')+
        `>${c.t}<span class="cn${c.id==='flag'&&out.length?' hot':''}">${N[c.id]}</span></button>`).join('');
  document.getElementById('toc').innerHTML=
    CATS.map(c=>`<button class="nav" onclick="goto('${c.id}')">${c.t}</button>`).join('');
  const tri=filter==='flag',sup=filter==='crit';                 // triage view earns an extra column
  const cols=n+6+(tri?1:0);
  const hd=ds.map((d,i)=>{const dt=new Date(d.date+'T00:00:00');
    return `<th class="dcol ${i===n-1?'dnow':''}" title="${d.date}">${dt.toLocaleString('en',{month:'short'})} '${d.date.slice(2,4)}</th>`;}).join('');
  let h=`<thead><tr><th class="nm lft">Marker</th>`+
    `<th class="now" title="Most recent value for this marker, whichever draw it came from">Latest</th>`+
    `<th class="uc lft"><button class="ubt" onclick="flipU()" title="Unit system for the whole table — Latest, every draw, the gauge, the chart and the delta. Click to switch to ${S.units==='si'?'US':'SI'}."><b class="${S.units==='us'?'on':''}">US</b><b class="${S.units==='si'?'on':''}">SI</b></button></th>`+
    `<th class="lc lft" title="How long ago the latest reading was taken">Age</th>`+
    (tri?`<th class="off lft" title="How far outside its range or target the latest value sits">Off by</th>`:'')+
    `<th class="pos lft">Range &amp; position</th>${hd}`+
    `<th class="tr lft" title="Latest reading vs the one before it">Since prev.</th></tr></thead>`;

  const R=m=>{
    const L=cur[m.id];
    let pill='<span class="nilx">—</span>',off='',lm='<span class="nilx">—</span>';
    if(L){const st=status(m,L.v),mo=months(L.d.date),old=mo>STALE,ex=excursion(m,L.v);
      pill=`<span class="pill ${st}" title="${fmt(dV(m,L.v))} ${uLab(m)} · measured ${L.d.date}">${fmt(dV(m,L.v))}</span>`;
      lm=`<span class="lm${old?' old':''}" title="Measured ${L.d.date}${old?' · over 18 months old':''}">${ago(mo)}</span>`;
      if(ex)off=`<span class="exc ${st}">${ex} <em>${uLab(m)}</em></span>`;}
    const cells=ds.map((d,i)=>{const e=d.v[m.id];
      if(!e)return `<td class="c nil ${i===n-1?'dnow':''}">·</td>`;
      const v=toUS(m,e.r,e.u);      // canonical: status() must judge in canonical
      // the tooltip keeps the value AS THE LAB PRINTED IT — provenance, never converted
      return `<td class="c has ${status(m,v)} ${i===n-1?'dnow':''}" title="${fmt(e.r)} ${unitOf(m,e.u).l}">${fmt(dV(m,v))}</td>`;}).join('');
    return `<tr class="m" data-id="${m.id}" onclick="det(this,'${m.id}',${cols},${n},${tri})">
      <td class="nm"><div class="n1">${m.en}</div><span class="fr">${m.fr}</span></td>
      <td class="now">${pill}</td>
      <td class="uc" title="Reported in: ${m.units.map(u=>u.l).join(' / ')}${
        S.units==='si'&&!siOf(m)?' · no SI equivalent — shown unconverted':''}">${uLab(m)}</td>
      <td class="lc">${lm}</td>
      ${tri?`<td class="off">${off}</td>`:''}
      <td class="pos">${mini(m)}</td>
      ${cells}<td class="tr">${trend(m)}</td></tr>`;
  };

  // each section is its OWN tbody: that is what stops the sticky bars piling up on each other
  const SEC=(id,title,sub,body)=>
    `<tbody${id?` id="sec-${id}"`:''}><tr class="grp"><td colspan="${cols}">`+
    `<div class="ghd"><div class="gt">${title}</div>${sub?`<div class="gs">${sub}</div>`:''}</div>`+
    `</td></tr>${body}</tbody>`;
  const NONE=t=>`<tr><td colspan="${cols}" style="padding:26px;text-align:center;color:var(--t3)">${t}</td></tr>`;

  if(q){
    const rows=MARK.filter(m=>m._h.includes(q));
    h+=SEC(null,'Search',`${rows.length} of ${MARK.length} markers match \u201c${esc(qRaw)}\u201d`,
      rows.length?rows.map(R).join(''):NONE('No marker matches that.'));
  } else if(filter==='flag'){
    const rows=MARK.filter(m=>cur[m.id]&&['out','watch'].includes(status(m,cur[m.id].v)))
                   .sort((a,b)=>sev(b,cur[b.id].v)-sev(a,cur[a.id].v));
    h+=SEC(null,'Needs attention','Ranked worst first, by how far outside its own range',
      rows.length?rows.map(R).join(''):NONE('Nothing flagged.'));
  } else if(sup){
    DECS.forEach((g,gi)=>{
      const rows=MARK.filter(m=>m.dec&&m.dec.includes(g));
      if(rows.length)h+=SEC('dec'+gi,`<span class="gtx">${g}</span>`,rows.length+' markers',rows.map(R).join('')); // id: the Stack page jumps here
    });
  } else {
    CATS.forEach(c=>{
      const rows=MARK.filter(m=>m.cat===c.id);
      if(rows.length)h+=SEC(c.id,c.t,rows.length+' markers',rows.map(R).join(''));
    });
  }
  openRow=null;                                        // the DOM is about to be replaced
  document.getElementById('tbl').innerHTML=h;
  requestAnimationFrame(()=>{if(typeof setTop==='function')setTop();});
}
const SRCH=document.getElementById('srch'),QI=document.getElementById('q'),TOP=document.getElementById('top');
function scrollToSec(sec){
  const el=document.getElementById('sec-'+sec),th=document.querySelector('thead th');
  if(!el||!th)return;
  // The header's rendered bottom, wherever it is pinned. Works for both scrollers.
  const headBottom=th.getBoundingClientRect().bottom;
  // (the tbody isn't sticky — only its cells are — so its rect is the true layout position)
  const barTop=el.getBoundingClientRect().top;
  window.scrollBy({top:barTop-headBottom+1,behavior:'smooth'});  // +1 tucks under, never a seam
}
function goto(cat){
  if(filter!=='all'||q){setF('all');requestAnimationFrame(()=>requestAnimationFrame(()=>scrollToSec(cat)));}
  else scrollToSec(cat);
}
// from a Stack row to the By-supplement group of markers it bears on
/* ---- pages ----
   'markers' is the whole table experience, filters and all. The other three render
   into #pages from the STACK / ROUTINE / DIET blocks, and the table-only controls
   fold away via html[data-page] (see the CSS). Nothing here touches table geometry. */
const PAGES={markers:'Markers',nextdraw:'Next Draw',stack:'Stack',routine:'Routine',diet:'Diet',training:'Training',grooming:'Grooming'};
let page='markers';
document.documentElement.dataset.page=page;
const PGEL=document.getElementById('pages'),

function movePtu(){   // slide the shared underline under the active tab
  const on=PTABS.querySelector('.pt.on'),u=document.getElementById('ptu');
  if(!on||!u||!on.offsetWidth)return;   // hidden strip: keep the last position
  const pad=parseFloat(getComputedStyle(on).paddingLeft)||0;
  u.style.left=(on.offsetLeft+pad)+'px';
  u.style.width=Math.max(0,on.offsetWidth-2*pad)+'px';
}
// Permanent scrollable top row — no menu. It auto-hides on scroll on the MARKERS page only
// (html.tabhid); _th tracks whether it's currently hidden. setPage resets it to shown.
let _th=false;
function setPage(p){
  if(!PAGES[p])return;
  if(p===page)return;
  page=p;
  document.documentElement.dataset.page=p;
  PGEL.hidden=p==='markers';
  document.querySelectorAll('#ptabs .pt').forEach(b=>b.classList.toggle('on',b.dataset.pg===p));   // no scroll-on-tap: the strip stays exactly where you left it
  if(p!=='markers')renderPage(p);
  document.documentElement.classList.remove('tabhid'); _th=false;   // land at the top with the tab row shown
  // The topbar changes composition here (pills + category appear only on Markers), so --toph
  // must be re-measured HERE. The ResizeObserver alone proved unreliable (unreferenced
  // observers can be GC'd), and a stale --toph leaves a phantom gap under the bar.

// the moving bar with no seam. (ResizeObserver would too, but it dies silently in the Preview
// pane / on iOS — so re-measure explicitly at the mutation site.)

    else{_pumping=false; setTop();} };   // settle: capture the full --toph once shown

// Auto-hide the tab row on the MARKERS page only: scroll down hides it, up reveals it, top shows.
let _lastY=0;
window.addEventListener('scroll',()=>{
  const y=window.scrollY, dy=y-_lastY;
  const s=y>12;
  if(s!==_stuck){_stuck=s;TB.classList.toggle('stuck',s);}
  TOP.classList.toggle('on',y>420);
  if(page==='markers'){                  // collapse ONLY on the table page
    let hide=_th;
    if(y<6) hide=false;                  // only pinned-shown at the very top
    else if(dy>0) hide=true;             // any downward scroll hides it at once
    else if(dy<-4) hide=false;           // a deliberate up-scroll reveals it
    if(hide!==_th){ _th=hide; DE.classList.toggle('tabhid',hide); pumpStick(); }
  }
  _lastY=y;
  if(!_rafx)_rafx=requestAnimationFrame(setNmW);
},{passive:true});
setNmW();
window.addEventListener('resize',()=>{setTop();setGut();fitChart();movePtu();},{passive:true});
// a horizontal pan on the pills band with nothing to scroll drives the TOC below.
// Raw touch events with preventDefault: iOS ignores overscroll-behavior on a
// no-overflow scroller and cancels pointer events once its pan latches, so the
// gesture must be claimed BEFORE the native latch (~10px) via an early axis lock.
{const sw=document.querySelector('.swap'),tc=document.getElementById('toc');
 if(sw&&tc&&sw.addEventListener){let _tx=null,_ty=null,_axis=null;
  sw.addEventListener('touchstart',e=>{
    // the tab strip scrolls natively — its gestures are not ours to redirect
    if(e.target.closest&&e.target.closest('.ptabs')){_tx=null;return;}
    _tx=e.touches[0].clientX;_ty=e.touches[0].clientY;_axis=null;},{passive:true});
  sw.addEventListener('touchmove',e=>{
    if(_tx==null)return;
    const x=e.touches[0].clientX,y=e.touches[0].clientY;
    if(_axis==null&&(Math.abs(x-_tx)>4||Math.abs(y-_ty)>4))
      _axis=Math.abs(x-_tx)>Math.abs(y-_ty)?'x':'y';
    if(_axis==='x'&&sw.scrollWidth<=sw.clientWidth+1&&e.cancelable){
      e.preventDefault();
      tc.scrollLeft+=_tx-x;
    }
    _tx=x;_ty=y;
  },{passive:false});
  const _end=()=>{_tx=null;_axis=null;};
  sw.addEventListener('touchend',_end,{passive:true});
  sw.addEventListener('touchcancel',_end,{passive:true});}}
TOP.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
function onQ(v){qRaw=v.trim();q=norm(qRaw);SRCH.classList.toggle('has',!!q);render();}
function sShut(){SRCH.classList.remove('open','has');QI.value='';QI.blur();if(q)onQ('');}
function setF(f){filter=f;
  if(q){QI.value='';q='';qRaw='';SRCH.classList.remove('has');}
  render();}
QI.addEventListener('focus',()=>SRCH.classList.add('open'));
QI.addEventListener('input',e=>onQ(e.target.value));
QI.addEventListener('blur',()=>setTimeout(()=>{               // let a click on the × land first
  if(!q&&document.activeElement!==QI)SRCH.classList.remove('open');},150));
document.getElementById('sbtn').addEventListener('click',()=>{
  if(SRCH.classList.contains('open')&&!q)sShut(); else QI.focus();});
document.getElementById('qx').addEventListener('click',()=>{QI.value='';onQ('');QI.focus();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&SRCH.classList.contains('open'))sShut();
  else if(e.key==='/'&&document.activeElement!==QI&&page==='markers'){e.preventDefault();QI.focus();}});
QI.placeholder='Search markers…';

// Toggling a row open then shut lands two clicks in the same spot: the browser reads that
// as a double-click and selects the word under the cursor. Suppress the selection on the
// 2nd+ click only, so a deliberate drag-select can still copy a value.
// Shift-click the search button to forget the cached data and load a fresh file.
document.getElementById('sbtn').addEventListener('click',e=>{
  if(!e.shiftKey)return;
  e.stopImmediatePropagation();
  try{localStorage.removeItem(DKEY);}catch(x){}
  askForFile();
},true);

document.getElementById('tbl').addEventListener('mousedown',e=>{
  if(e.detail>1&&e.target.closest&&e.target.closest('tr.m'))e.preventDefault();
});

load();
</script>
