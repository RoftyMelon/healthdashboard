<meta charset="utf-8">
<!-- minimum-scale pins iOS: switching back to the wide markers table from a narrow page
     otherwise re-runs Safari's fit-to-width and zooms the whole page out -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- iOS Safari's data detectors auto-link anything that smells like a date, duration or
     phone number and render it blue. "4mo", "2.3y" and 4-digit values all qualify. Off. -->
<meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
<!-- Without this Safari tints its toolbar with a default (white). Kept in sync with the
     theme by paint(), because the toggle overrides the OS preference. -->
<meta name="theme-color" content="#FFFFFF">
<!-- Add to Home Screen -> runs standalone: no address bar, no bottom toolbar, full screen.
     The only way to be rid of Safari's chrome, since its collapse gesture can't be forced. -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Blood panel">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" href="./icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* :root[data-theme=dark], not bare [data-theme=dark]: the light block below is `:root,...`
   — equal specificity, later in the file, so a bare attribute selector LOSES the tie and
   dark can never apply. The :root prefix outranks it; light stays the no-JS default. */
:root[data-theme=dark]{
  --chrome:#262624;
  /* Claude dark: warm near-black grey, never a cold blue-black */
  --bg:#262624;
  --txt:#F5F4EF; --t2:rgba(245,244,239,.62); --t3:rgba(245,244,239,.42); --t4:rgba(245,244,239,.26);
  --line:rgba(245,244,239,.13); --line2:rgba(245,244,239,.075);
  --ok:#52C07E; --watch:#E5A34A; --out:#F0705F; --info:#7FB3F0;
  --stick:#262624; --head:#30302E;
  --hov:rgba(127,179,240,.10); --hovs:#2B3239; --grp:#2F2F2C; --sel:#7FB3F0;
  --band:rgba(245,244,239,.16);
  --btn:#30302E; --btn-b:rgba(245,244,239,.14); --btn-h:#3B3B37;
  --sol:#F5F4EF; --sol-t:#262624;
  --mg:rgba(245,244,239,.07);
  --frost:rgba(48,48,46,.72); --frost-b:rgba(245,244,239,.14); --frost-h:rgba(59,59,55,.9);
}
:root{--thh:30px; --nm:180px; --hh:64px}   /* sizing: theme-independent, must not sit in a theme block */
/* TYPE SCALE — one rationale across every tab:
   26 page title (.pgh — caps card titles gain ~40% optical size, so the title
   needs real distance to LOOK biggest) · 14 card/session title (.ccard>b), 12.5 .cgrp ·
   16 body & controls (content rows, page-intro .lead notes, subtitles, tabs,
   names, search) · 15 secondary (doses, caveat notes, links, 14.5 filter chips) · 14 caps
   section labels (.pgst/.cgrp) + hints · ~13 micro data (hour marks, kg,
   supplement pills, counts, column heads) · 11.5 absolute floor (chart
   bracket/axis micro-labels only). Mobile may step ONE notch down for density
   (names 15, table group titles 14.5, page title 24) and never below the floor.
   Zoom is disabled: sizes stand alone. */
:root,[data-theme=light]{--chrome:#FFFFFF;   /* pre-compensates Safari's darkening; see paint() */
  
  /* Claude cream: warm ivory paper, warm near-black ink */
  --bg:#FAF9F5;
  --txt:#1F1E1D; --t2:rgba(31,30,29,.64); --t3:rgba(31,30,29,.45); --t4:rgba(31,30,29,.27);
  --line:rgba(31,30,29,.14); --line2:rgba(31,30,29,.08);
  --ok:#146B45; --watch:#9C5B0D; --out:#B23B30; --info:#3D6AA8;
  --stick:#FAF9F5; --head:#F0EEE6;
  --hov:rgba(61,106,168,.075); --hovs:#EDF0F6; --grp:#EFEDE3; --sel:#3D6AA8;
  --band:rgba(31,30,29,.16);
  --btn:#FFFFFF; --btn-b:rgba(31,30,29,.15); --btn-h:#F0EEE6;
  --sol:#1F1E1D; --sol-t:#FAF9F5;
  --mg:rgba(31,30,29,.08);
  --frost:rgba(250,249,245,.75); --frost-b:rgba(31,30,29,.14); --frost-h:rgba(250,249,245,.95);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1;position:relative;
  min-height:100vh;min-height:100dvh}   /* dvh tracks Safari's collapsing bottom bar */
/* Theme flip: colours crossfade in place. The orbit is excluded, or this shorthand
   would replace its transition list and kill the 850ms transform. */
html.tfade,html.tfade *:not(.orbit-disc):not(.icon-moon):not(.icon-sun),
html.tfade *::before,html.tfade *::after{
  transition:background-color .22s ease,color .22s ease,border-color .22s ease,
             fill .22s ease,stroke .22s ease !important}
.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 20px 110px}
.topbar{position:fixed;top:0;left:0;width:100%;z-index:50;background:var(--bg);
  padding:8px var(--gut,20px) 0;   /* ONE constant height for the row — pills and tabs share
                                      the station; 8px is the standard minimum comfortable inset */
  transition:border-color .2s ease;border-bottom:.5px solid transparent}
.topspacer{height:var(--toph,112px)}   /* fixed takes it out of flow; hold its place */
.topbar.stuck{border-bottom-color:var(--line)}

button{font-family:inherit;font-size:15px;font-weight:550;letter-spacing:-.005em;
  padding:9px 15px;border-radius:11px;cursor:pointer;transition:.18s cubic-bezier(.3,.9,.3,1);
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--txt)}
button:hover{background:var(--btn-h)}
button.solid{background:var(--sol);color:var(--sol-t);border-color:transparent;font-weight:600}
button.solid:hover{opacity:.9;background:var(--sol)}
button.warn{color:var(--out);border-color:var(--out);background:transparent}
button.warn:hover{background:var(--out);color:#fff}
button.ic{padding:0;width:40px;height:40px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;color:var(--t2)}
button.ic:hover{color:var(--txt)}

/* Orbit toggle. The clip circle IS the horizon: icons exist only inside it.
   The disc pivots BELOW the window (50% 104%), so they rise and set on a shallow
   arc rather than popping straight up. The sun layer is pre-rotated 180deg, so it
   waits on the far side. Each click adds +180deg, always the same direction. */
.orbit{position:relative;width:100%;height:100%;display:block;
  -webkit-clip-path:circle(50%);clip-path:circle(50%)}
.orbit-disc{position:absolute;inset:0;transform-origin:50% 104%}
.orbit-layer{position:absolute;inset:0}
.orbit-layer.sun-side{transform:rotate(180deg);transform-origin:50% 104%}
.icon-moon{position:absolute;left:calc(50% - 10px);top:calc(50% - 10px)}
.icon-sun{position:absolute;left:calc(50% - 12px);top:calc(50% - 12px)}
.orbit-disc,.icon-moon,.icon-sun{transition:transform .85s cubic-bezier(.55,.05,.22,1)}
button:focus-visible{outline:2px solid var(--info);outline-offset:2px}

td.boot{padding:60px 24px;text-align:center;line-height:1.8;color:var(--txt);font-size:17px}
td.boot span{color:var(--t3);font-size:15px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.topline{display:flex;align-items:flex-start;gap:10px}
.bar{flex:1;min-width:0;display:flex;gap:6px;row-gap:2px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.chips{display:contents}
/* -5px lines the first link's LABEL up with the hamburger glyph above it: the 28px glyph
   sits centered in its 40px box (6px inset from the gutter), the label at -5px + 12px pad ≈ 7px.
   flex-basis:100% pins the toc to its OWN flex line — otherwise the packing math is free to
   squeeze it inline and wrap the pills instead. */
.toc{display:flex;gap:2px;min-width:0;flex-basis:100%;   /* pill BOXES align to the gutter */
  flex-wrap:nowrap;overflow-x:auto;                 /* never wrap: scroll instead */
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.toc::-webkit-scrollbar{display:none}
.nav{flex:none}
.srch{display:flex;align-items:center;flex:none;width:36px;height:36px;border-radius:99px;overflow:hidden;
  background:var(--btn);border:.5px solid var(--btn-b);
  transition:width .3s cubic-bezier(.2,.9,.25,1),border-color .16s}
.srch.open{width:210px;border-color:var(--txt)}
.srch .sicon{flex:none;width:34px;height:34px; display:flex;align-items:center;justify-content:center;
  padding:0;border:none;background:none;border-radius:50%;color:var(--t3)}
.srch .sicon:hover{background:none;color:var(--txt)}
.srch.open .sicon{color:var(--t2);cursor:default}
.srch input{flex:1;min-width:0;height:100%;padding:0;border:none;background:none;border-radius:0;outline:none;
  font-family:inherit;font-size:16px;font-weight:450;color:var(--txt);
  opacity:0;transition:opacity .16s ease .1s}
.srch.open input{opacity:1}
.srch input::placeholder{color:var(--t3)}
.srch input:focus-visible{outline:none}
.srch .qx{display:none;flex:none;width:26px;height:26px;margin-right:5px;padding:0;line-height:24px;
  text-align:center;font-size:20px;font-weight:400;border:none;background:none;border-radius:50%;color:var(--t3)}
.srch .qx:hover{background:var(--btn-h);color:var(--txt)}
.srch.has .qx{display:block}
.chip{font-family:inherit;font-size:14.5px;font-weight:520;padding:8px 14px;border-radius:99px;cursor:pointer;
  flex:none;white-space:nowrap;   /* scroll past the row's edge, never shrink or wrap */
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--t2);transition:.16s}
.chip:hover{background:var(--btn-h);color:var(--txt)}
.chip[aria-pressed=true]{background:var(--sol);color:var(--sol-t);border-color:transparent;font-weight:600}
.cn{font-size:12.5px;font-weight:700;margin-left:6px;opacity:.45;font-variant-numeric:tabular-nums}
.cn.hot{color:var(--out);opacity:1}
.chip[aria-pressed=true] .cn{color:inherit;opacity:.55}

/* table */

table{border-collapse:separate;border-spacing:0;table-layout:fixed;width:100%;min-width:1130px}
thead th{position:sticky;top:var(--toph,70px);z-index:8;background:var(--head);
  font-size:12.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);
  height:var(--thh);padding:0 10px;vertical-align:middle;
  text-align:right;white-space:nowrap;border-bottom:.5px solid var(--line)}
thead th.lft{text-align:left}
/* Frozen block: identity + current value + unit. Everything to its right scrolls.
   With table-layout:fixed these widths are REAL, so the sticky offsets can trust them. */
th.nm,td.nm,th.now,td.now,th.uc,td.uc{position:sticky;z-index:2;background:var(--stick)}
th.nm,td.nm{left:var(--gut,20px);text-align:left;width:var(--nm)}
th.now,td.now{left:calc(var(--gut,20px) + var(--nm));width:68px}
thead th.now{padding:0 5px}   /* 'LATEST' is the only thing keeping this column wide */
th.uc,td.uc{left:calc(var(--gut,20px) + var(--nm) + 68px);width:62px;
  border-right:1.5px solid var(--line)}
th.lc,td.lc{width:52px}
th.off,td.off{width:150px}
th.pos,td.pos{width:170px}
th.tr,td.tr{min-width:104px}   /* no width: absorbs the leftover */
thead th.nm,thead th.now,thead th.uc{background:var(--head);z-index:9}
thead th.now{color:var(--txt)}
tr.grp td{position:sticky;top:calc(var(--toph,70px) + var(--thh) - 3px);z-index:6;padding:0;
  background:var(--grp);
  border-top:.5px solid var(--line);border-bottom:.5px solid var(--line)}
tr.grp .ghd{position:sticky;left:var(--gut,20px);width:fit-content;text-align:left;
  padding:9px 10px 10px;
  display:flex;align-items:baseline;gap:11px;white-space:nowrap}
tr.grp .gt{font-size:15.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  /* µ uppercases to Greek Mu, which looks like M. Units must never be case-mapped. */
  color:var(--txt);line-height:1.25}
.gtx{text-transform:none}   /* supplement group titles carry DOSES: exempt from the uppercase */
tr.grp .gs{font-size:13.5px;font-weight:450;letter-spacing:0;color:var(--t4);line-height:1.35}

td.tr{text-align:left;padding-left:14px}
.trw{display:flex;align-items:baseline;gap:7px}
.dlt{font-size:15.5px;font-weight:600;color:var(--t2);font-variant-numeric:tabular-nums;
  white-space:nowrap;letter-spacing:-.01em}
.tsp{font-size:12.5px;color:var(--t4);white-space:nowrap;font-variant-numeric:tabular-nums}
.tnil{color:var(--t4)}

/* expanded chart: x-axis IS the draw columns above it */
tr.det>td{padding:0;border-bottom:.5px solid var(--line)}
.dwrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .34s cubic-bezier(.25,.9,.3,1)}
.dwrap.open{grid-template-rows:1fr}
.dclip{overflow:hidden;min-height:0;background:var(--grp);
  box-shadow:inset 3px 0 0 var(--sel)}
.chart{display:flex;height:200px;padding:22px 0 18px;opacity:0;transition:opacity .2s ease}
.dwrap.open .chart{opacity:1}
.cy{flex:none;position:relative;color:var(--t3)}
.cyl{position:absolute;right:14px;height:0;display:flex;align-items:center;justify-content:flex-end}
.cyl span{font-size:13px;font-variant-numeric:tabular-nums;background:var(--grp);padding:0 5px;
  transform:translateY(-.5px)}
.cyl.o span{color:var(--ok);font-weight:600}
.cyu{position:absolute;right:14px;top:-7px;font-size:13px;font-weight:500;color:var(--t4)}
.ckey{position:absolute;right:48px;top:0;bottom:0;display:flex;gap:14px}
.cka{position:relative;flex:none}
.cka.ref{width:34px}
.cka.opt{width:64px}
/* each bracket spans its own range at the plot's y-scale, so reference NESTS around optimal */
.ckt{position:absolute;right:0;display:flex;align-items:center;gap:8px}
.ckbr{flex:none;width:8px;align-self:stretch;border:1px solid var(--t4);
  border-right:none;border-radius:3px 0 0 3px}
.ckbr.opt{border-color:color-mix(in srgb,var(--ok) 70%,transparent)}
/* vertical, reading bottom-to-top, like a y-axis title. The numbers are on the axis already. */
.ckl{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;
  /* In vertical-rl, flex 'column' runs along the BLOCK axis (the two columns), and
     align-items centres along the INLINE axis, which is the vertical one. */
  display:flex;flex-direction:column;align-items:center;gap:10px;
  font-size:14.5px;font-weight:600;color:var(--txt);letter-spacing:.01em}
/* horizontal, and centred on the bracket's span: it sits INSIDE the range it qualifies */
/* rides in the vertical flow, below the label. Logical properties, because in
   vertical-rl the inline axis IS the vertical one. */
.ckl em{font-style:normal;font-size:11.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t3);border:.5px solid var(--line);border-radius:4px;
  padding-inline:7px;padding-block:2px}
/* visual weight tracks evidential weight. No status colour borrowed:
   green/amber/red mean things about your blood, never about my confidence. */
.ckl em.strong{color:var(--t2);border-color:var(--t3);border-width:1px}
.ckl em.weak{color:var(--t4);border-style:dashed}
.cy::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:var(--line)}
.cplot{flex:1;position:relative}
.cplot svg{position:absolute;inset:0;width:100%;height:100%;color:var(--t2);overflow:visible}
.cb{position:absolute;left:0;right:0}
.cb.clin{background:var(--band)}
.cb.opt{background:var(--ok);opacity:.22}
.cgl{position:absolute;left:0;right:0;height:0;border-top:.5px dashed var(--line)}
.cgl.o{border-top-color:color-mix(in srgb,var(--ok) 45%,transparent)}
.cd{position:absolute;width:9px;height:9px;border-radius:50%;transform:translate(-50%,50%);
  border:2px solid var(--grp)}
.cd.ok{background:var(--ok)} .cd.watch{background:var(--watch)} .cd.out{background:var(--out)}
.cpad{flex:none}
@media(prefers-reduced-motion:reduce){.dwrap{grid-template-rows:1fr}.chart{opacity:1}}
tbody td{padding:9px 10px;font-size:15.5px;text-align:right;white-space:nowrap;color:var(--t2);
  border-bottom:.5px solid var(--line2);font-variant-numeric:tabular-nums}
tr.m{cursor:pointer;transition:background .14s}
tr.m:hover td{background:var(--hov)}
tr.m:hover td.now,tr.m:hover td.uc{background:var(--hovs)}
tr.m:hover td.nm{background:linear-gradient(90deg,var(--sel) 0,var(--sel) 3px,var(--hovs) 3px)}
td.nm{font-size:16px;font-weight:560;color:var(--txt);letter-spacing:-.01em;overflow:hidden}
td.nm .n1{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.nm .fr{font-size:12.5px;font-weight:400;color:var(--t4);display:block;margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0}
td.uc{text-align:left;padding-left:7px;font-size:14px;color:var(--t3);
  white-space:nowrap;font-variant-numeric:tabular-nums}
td.lc{text-align:left;padding-left:10px;white-space:nowrap}
.lm{font-size:14px;font-weight:500;color:var(--t2);font-variant-numeric:tabular-nums}
.lm.old{color:var(--info);font-weight:650}
.nilx{color:var(--t4)}
td.c{font-size:15px;color:var(--t3);text-align:center;padding:9px 4px}
th.dcol{text-align:center;width:64px;padding:0 4px;letter-spacing:.05em}
td.c.has{color:var(--t2)}
td.c.ok{color:var(--ok)}td.c.watch{color:var(--watch)}td.c.out{color:var(--out);font-weight:600}
td.nil{color:var(--t4)}
td.now{white-space:nowrap;padding-right:4px}
td.dnow,th.dnow{font-weight:700;color:var(--txt)}

/* current pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:10px;
  font-size:16px;font-weight:650;letter-spacing:-.015em;font-variant-numeric:tabular-nums;
  background:var(--btn);border:.5px solid var(--btn-b);color:var(--txt)}
.pill.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent);
  border-color:color-mix(in srgb,var(--ok) 32%,transparent)}
.pill.watch{color:var(--watch);background:color-mix(in srgb,var(--watch) 12%,transparent);
  border-color:color-mix(in srgb,var(--watch) 32%,transparent)}
.pill.out{color:var(--out);background:color-mix(in srgb,var(--out) 14%,transparent);
  border-color:color-mix(in srgb,var(--out) 38%,transparent);}
td.off{text-align:left;padding-left:16px;white-space:nowrap}
.exc{font-size:15px;font-weight:600;white-space:nowrap;letter-spacing:-.01em}
.exc em{font-style:normal;font-weight:500;opacity:.62;font-size:13.5px}
.exc.out{color:var(--out)} .exc.watch{color:var(--watch)}

/* THE INLINE GAUGE */
td.pos{padding-right:14px}
.mg{position:relative;height:9px;border-radius:5px;background:var(--mg)}
.mgc{position:absolute;top:0;height:9px;border-radius:5px;background:var(--band)}
.mgo{position:absolute;top:0;height:9px;border-radius:5px;background:var(--ok);opacity:.72}
.mgt{position:absolute;top:-3.5px;width:3px;height:16px;border-radius:2px;transform:translateX(-1.5px);
  background:var(--txt);transition:left .6s cubic-bezier(.2,.85,.25,1)}
.mgt.ok{background:var(--ok);}
.mgt.watch{background:var(--watch);}
.mgt.out{background:var(--out);width:3.5px}
.mgx{position:relative;height:11px;margin-top:5px}
.mgx span{position:absolute;font-size:11.5px;color:var(--t4);font-variant-numeric:tabular-nums;white-space:nowrap}
.mgx span.o{color:var(--ok);font-weight:600}

.gutmask{position:fixed;top:0;left:0;width:var(--gut,20px);height:100%;
  background:var(--bg);z-index:7;pointer-events:none}
.top{position:fixed;right:26px;bottom:calc(26px + env(safe-area-inset-bottom));z-index:40;width:44px;height:44px;padding:0;
  display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;
  background:var(--frost);border:.5px solid var(--frost-b);color:var(--t2);
  backdrop-filter:blur(9px) saturate(150%);-webkit-backdrop-filter:blur(9px) saturate(150%);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .22s ease,transform .22s cubic-bezier(.2,.9,.25,1),color .14s,background .14s}
.top.on{opacity:1;pointer-events:auto;transform:none}
.top:hover{background:var(--frost-h);color:var(--txt)}

/* the categories navigate, they do not filter */
.nav{font-family:inherit;font-size:15px;font-weight:500;padding:5px 12px;border-radius:99px;cursor:pointer;
  background:none;border:.5px solid transparent;color:var(--t3);transition:.14s}
.nav:hover{background:var(--btn);border-color:var(--btn-b);color:var(--txt);transform:none}

/* ---- pages: a naked hamburger, its popover, and the three data pages ----
   Pills FILTER the table; the menu NAVIGATES between pages. Different species on purpose. */
/* leaving Markers, the button COLLAPSES (width -> 0) rather than display:none, so the
   strip slides left progressively instead of teleporting. Width, the gap-cancelling
   margin and the strip's own margin all ride the same curve: one motion.
   The BASE transition (returning to Markers) is DELAYED .22s: the strip fades out in
   place first, then the button grows in together with the arriving filters — without
   the delay, three motions fight and the return reads as mush. The collapsed rule
   below overrides with zero delay, so LEAVING Markers still slides immediately. */
.pgnav{display:flex;align-items:center;flex:none;width:46px;overflow:hidden;
  transition:width .34s cubic-bezier(.2,.7,.3,1) .22s,margin-right .34s cubic-bezier(.2,.7,.3,1) .22s,
             opacity .22s ease .22s,visibility .34s .22s}

.pgs{max-width:780px;padding:0 0 40px}

.pgsec{margin-top:22px;max-width:430px}   /* stack rows are short: name + dose + tip */
.pgsec.nohead{margin-top:0}   /* a headerless section CONTINUES the one above it */

.sd{font-size:15px;color:var(--t2);font-variant-numeric:tabular-nums}

.rhr{display:flex;gap:14px;position:relative}   /* anchors the full-width boundary lines */
.pgsub+.rhr{margin-top:18px}   /* the ruler breathes below the header (the old cards carried this gap) */
.rht{flex:none;width:64px;font-size:13px;font-weight:600;color:var(--t4);
  font-variant-numeric:tabular-nums;letter-spacing:.02em}
/* calendar convention: a label anchors at the TOP of its cell and marks the hour's
   START; only block boundaries draw a line. Every hour is exactly --hh tall. */
.rhl{display:flex;align-items:flex-start;gap:6px;height:var(--hh);white-space:nowrap}
/* a boundary line runs from a clear step past the label to the row's right edge.
   It positions against .rhr at the first label's line — safe because the hour-walk
   guarantees a boundary hour always STARTS its row. The tabular HH:00 ends ~31px;
   left:0 would strike THROUGH it. */
.rhl.lt::after{content:"";position:absolute;left:44px;top:7px;height:.5px;
  width:min(calc(100% - 44px),250px);background:var(--t4);opacity:.55}
  /* 410px = the longest row text ("Gym - phone stays OFF...") — the line matches it */
/* every row centres its content between the boundary lines of its span. UNIFORM
   HEIGHT IS THE CONTRACT: the padding must leave a 2-line row (07:00) and a
   two-event hour (17:00, 21:00) fitting inside one --hh cell — a row that
   stretches breaks the ruler silently. */
.rcell{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:12px 0 0}
/* stacked point-pairs share the EXACT geometry of the sub-hour span pairs:
   absolute revs, text centres at 22px and 53px of the cell, no row stretch */
.rhr.multi:not(.rprop) .rcell{position:relative;padding:0}
.rhr.multi:not(.rprop) .rev{position:absolute;left:0;right:0;padding:0;top:10px}
.rhr.multi:not(.rprop) .rev+.rev{top:41px}
.rhr.multi:not(.rprop):has(+.rlast) .rev+.rev{top:37px}   /* before the terminal row:
   centre the middle moment between its neighbours (equal 27px gaps) */
/* sub-hour rows: events sit at their real minutes; hairlines cut the fractions */
.rhr.rprop .rcell{position:relative;padding:0}
.rhr.rprop .rev{position:absolute;left:0;right:0;padding:0}
.rln{position:absolute;left:44px;width:min(calc(100% - 44px),250px);height:.5px;
  background:var(--t4);opacity:.55}

   and align-items is left at stretch so ALL text shares the same left edge.

   when .rcell went flex-direction:column — blocks drifted to the middle.) */
/* the day's LAST hour is a terminal point, not a span: its text sits ON the line
   beside the label, and the row carries no empty hour below it */
.rhr.rlast .rhl{height:auto;line-height:24px}   /* match the content's 16px/1.5 line box: BASELINES level */
.rhr.rlast .rcell{justify-content:flex-start;padding-top:0}
.rhr.rlast .rev{padding-top:0}
.rev{display:flex;gap:12px;align-items:baseline;padding:2px 0}
.rbody{min-width:0}
.rdo{font-size:16px;color:var(--t2);line-height:1.5}
.rsup{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.rsup .rs{font-size:13.5px;color:var(--t2);background:var(--btn);border:.5px solid var(--btn-b);
  border-radius:99px;padding:3px 9px;font-variant-numeric:tabular-nums}

            <svg class="icon-moon" id="omoon" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
          <span class="orbit-layer sun-side">
            <svg class="icon-sun" id="osun" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4.6"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          </span>

    </div>
  </div>
  <div class="topspacer"></div>
  <div class="shell"><div class="scroll"><table id="tbl"><tbody><tr><td class="boot">
      <b>Loading…</b><br><span>If this stays here, JavaScript did not run.
      iOS previews HTML in a sandbox that sometimes blocks it. Open the file in a browser instead.</span>
    </td></tr></tbody></table></div></div>
  <div id="pages" class="pgs" hidden></div>
</div>

<div class="gutmask" aria-hidden="true"></div>

<button class="top" id="top" aria-label="Back to top" title="Back to top">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<script>
/* The data file inherits the page's query string, so a cache-busted visit
   (?fresh) fetches BOTH files fresh — otherwise a new viewer can pair with a
   10-minute-stale bloodwork.js off the CDN and render a mixed version. */
document.write('<script src="./bloodwork.js'+(location.search||'')+'"><\/script>');
</script>
<script>
// ---- DATA LIVES IN bloodwork.json ----
// One source of truth. The dashboard reads it; so does any AI you hand it to.
// To add a draw, edit that file. Never edit data in here.
let MARK=[],DECS=[],CATS=[],DATA={draws:[]},STACK=null,ROUTINE=[],DIET=null,CARE=[],TRAINING=null,PRESCRIPTION=null;

// Accent-folding, so "hemoglobine" finds "Hémoglobine". NFKD splits the accent off the
// letter; the range then strips it. œ/æ have no decomposition, so they're folded by hand.
const norm=s=>s.toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
  .replace(/œ/g,'oe').replace(/æ/g,'ae');

const TKEY='bloodpanel.theme';
// S.draws is filled AFTER the fetch — it can't reference DATA at declaration time any more.
let S={draws:[],theme:'light'},filter='all',q='',qRaw='',openRow=null;

// u is a unit LABEL ("mg/L"), not an index — an AI can't silently fat-finger a string the
// way it can an integer. Numbers still work, for anything written the old way.
const unitOf=(m,u)=>(typeof u==='number'?m.units[u]:m.units.find(x=>x.l===u))||m.units[0];
const toUS=(m,r,u)=>{const x=unitOf(m,u);
  return x.a!==undefined?x.a*r+x.b:r*x.m;};
const fmt=n=>{const a=Math.abs(n);const d=a>=100?0:a>=10?1:a>=1?2:3;return parseFloat(n.toFixed(d)).toString();};
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function status(m,v){if(v==null||isNaN(v))return'none';
  if(v<m.clin[0]||v>m.clin[1])return'out';
  if(m.opt&&(v<m.opt[0]||v>m.opt[1]))return'watch';return'ok';}
const chron=()=>S.draws.slice().sort((a,b)=>a.date.localeCompare(b.date));
function latest(m){const c=chron().filter(d=>d.v[m.id]);if(!c.length)return null;
  const d=c[c.length-1];return{d,v:toUS(m,d.v[m.id].r,d.v[m.id].u),raw:d.v[m.id]};}
const NOW=new Date(),STALE=18;
const ago=mo=>mo<1?'<1mo':mo<12?mo+'mo':(Math.round(mo/12*10)/10)+'y';
const months=ds=>{const d=new Date(ds+'T00:00:00');
  return (NOW.getFullYear()-d.getFullYear())*12+(NOW.getMonth()-d.getMonth());};
const C=()=>S.theme==='light'?{ok:'#1B8A47',watch:'#B4610A',out:'#CE1126'}
                             :{ok:'#30D158',watch:'#FF9F0A',out:'#FF453A'};
const ODISC=document.getElementById('odisc'),OMOON=document.getElementById('omoon'),
      OSUN=document.getElementById('osun');
let orbitR=0;
function setOrbit(animate){
  const els=[ODISC,OMOON,OSUN];
  if(!animate)els.forEach(e=>e.style.transition='none');
  ODISC.style.transform=`rotate(${orbitR}deg)`;
  OMOON.style.transform=`rotate(${-orbitR}deg)`;          // counter-rotate: stay upright in orbit
  OSUN.style.transform =`rotate(${-(orbitR+180)}deg)`;
  if(!animate){void ODISC.offsetWidth;els.forEach(e=>e.style.transition='');}  // flush, don't animate
}
function paint(){
  const H=document.documentElement;
  H.dataset.theme=S.theme;
  const tc=document.querySelector('meta[name=theme-color]');   // Safari tints its chrome with this
  if(tc)tc.setAttribute('content',getComputedStyle(H).getPropertyValue('--chrome').trim()||'#FFFFFF');
  const lbl=S.theme==='dark'?'Switch to light mode':'Switch to dark mode';
  const b=document.getElementById('tbtn'); b.setAttribute('aria-label',lbl); b.title=lbl;
}
let themeChosen=false;   // a manual flip beats the OS preference, and is persisted
async function flip(){
  const H=document.documentElement;
  orbitR+=180; setOrbit(true);                 // live button, uninterrupted 850ms orbit
  H.classList.add('tfade');
  themeChosen=true;
  S.theme=S.theme==='light'?'dark':'light';
  paint();
  clearTimeout(flip._t);
  flip._t=setTimeout(()=>H.classList.remove('tfade'),300);   // then get out of hover's way
  try{if(window.storage)await window.storage.set(TKEY,S.theme);}catch(e){}
}
const DKEY='bloodpanel.data';

// If an AI edited this file, catch what it got wrong BEFORE it becomes a number on screen.
function audit(j){
  const bad=[],ids=new Set(j.MARK.map(m=>m.id));
  j.DATA.draws.forEach(d=>{
    if(!/^\d{4}-\d{2}-\d{2}$/.test(d.date))bad.push(`draw "${d.id}": date "${d.date}" is not YYYY-MM-DD`);
    Object.entries(d.v).forEach(([id,v])=>{
      const m=j.MARK.find(x=>x.id===id);
      if(!m){bad.push(`draw ${d.date}: unknown marker "${id}" — it will be IGNORED`);return;}
      if(typeof v.u==='string'&&!m.units.some(x=>x.l===v.u))
        bad.push(`draw ${d.date}, ${m.en}: unit "${v.u}" is not one of [${m.units.map(x=>x.l).join(', ')}]`);
      if(typeof v.r!=='number'||!isFinite(v.r))
        bad.push(`draw ${d.date}, ${m.en}: value "${v.r}" is not a number`);
    });
  });
  // lifestyle blocks are optional, but if present they obey the same contract: exact or rejected
  if(j.STACK){
    const cids=new Set((j.STACK.cats||[]).map(c=>c.id));
    const ST=['taking','candidate','stopped','dropped','planned'],SL=['breakfast','lunch','dinner','evening'];
    (j.STACK.items||[]).forEach(s=>{
      if(!cids.has(s.cat))bad.push(`STACK "${s.name}": category "${s.cat}" is not in STACK.cats`);
      if(!ST.includes(s.status))bad.push(`STACK "${s.name}": status "${s.status}" is not one of ${ST.join('/')}`);
      if(s.when!=null&&!SL.includes(s.when))bad.push(`STACK "${s.name}": when "${s.when}" is not one of ${SL.join('/')}`);
      if(s.dec!=null&&!j.DECS.includes(s.dec))bad.push(`STACK "${s.name}": dec "${s.dec}" is not a DECS label`);
      if(s.url!=null&&!/^https:\/\//.test(s.url))bad.push(`STACK "${s.name}": url must start with https://`);
      if(s.ev!=null&&!['strong','moderate','weak'].includes(s.ev))bad.push(`STACK "${s.name}": ev "${s.ev}" is not strong/moderate/weak`);
    });
  }
  if(j.PRESCRIPTION){
    if(!Array.isArray(j.PRESCRIPTION.items))bad.push('PRESCRIPTION.items must be an array (empty is fine)');
    else j.PRESCRIPTION.items.forEach(x=>{if(typeof x!=='string')bad.push('PRESCRIPTION items are strings');});
  }
  if(j.ROUTINE){
    let prev='';
    j.ROUTINE.forEach(r=>{
      if(!/^\d{2}:\d{2}$/.test(r.t))bad.push(`ROUTINE "${r.do}": time "${r.t}" is not HH:MM`);
      else{if(r.t<=prev)bad.push(`ROUTINE "${r.t} ${r.do}": times must be ascending`);prev=r.t;}
      if(r.until!=null&&(!/^\d{2}:\d{2}$/.test(r.until)||r.until<=r.t))
        bad.push(`ROUTINE "${r.do}": until "${r.until}" must be HH:MM and later than ${r.t}`);
      if(r.slot!=null&&!['breakfast','lunch','dinner'].includes(r.slot))
        bad.push(`ROUTINE "${r.do}": slot "${r.slot}" is not breakfast/lunch/dinner`);
    });
  }
  if(j.DIET)(j.DIET.meals||[]).forEach(m=>{
    if(!m.items||!m.items.length)bad.push(`DIET "${m.t}": meal has no items`);
  });
  if(j.CARE)j.CARE.forEach(c=>{
    if(c.groups)c.groups.forEach(g=>{
      if(!Array.isArray(g.items)||!g.items.length)bad.push(`CARE "${c.t}" / "${g.t}": group needs items`);});
    else if(!Array.isArray(c.items))bad.push(`CARE "${c.t}": items must be an array (empty is fine)`);
  });
  if(j.TRAINING)(j.TRAINING.cards||[]).forEach(c=>{
    if(c.groups)c.groups.forEach(g=>{
      if(!Array.isArray(g.items)||!g.items.length){bad.push(`TRAINING "${c.t}" / "${g.t}": group needs items`);return;}
      g.items.forEach(x=>{
        if(typeof x==='string')return;
        if(!x.n)bad.push(`TRAINING "${c.t}" / "${g.t}": exercise needs a name`);
        if(x.sets!=null&&(!Array.isArray(x.sets)||x.sets.some(s=>!Array.isArray(s)||s.length!==2)))
          bad.push(`TRAINING "${x.n}": sets must be [kg,reps] pairs`);
      });
    });
    else if(!Array.isArray(c.items))bad.push(`TRAINING "${c.t}": items must be an array (empty is fine)`);
  });
  return bad;
}

function boot(j,cache){
  const bad=audit(j);
  if(bad.length){
    document.getElementById('tbl').innerHTML=
      '<tbody><tr><td style="padding:40px 24px;line-height:1.9;color:var(--t2)">'+
      '<b style="color:var(--out);font-size:15px">'+bad.length+' problem'+(bad.length>1?'s':'')+' in bloodwork.js</b><br>'+
      '<span style="font-size:12px;color:var(--t3)">Fix these before trusting anything below.</span><br><br>'+
      bad.map(b=>'&bull; '+esc(b)).join('<br>')+'</td></tr></tbody>';
    return;                                   // refuse to render rather than render a lie
  }
  MARK=j.MARK; DECS=j.DECS; CATS=j.CATS; DATA=j.DATA;
  STACK=j.STACK||null; ROUTINE=j.ROUTINE||[]; DIET=j.DIET||null; CARE=j.CARE||[]; TRAINING=j.TRAINING||null; PRESCRIPTION=j.PRESCRIPTION||null;
  S.draws=DATA.draws;
  MARK.forEach(m=>m._h=norm(m.en+' '+m.fr+' '+m.us));   // search index, derived
  // Remember it, so opening from disk on a phone doesn't mean re-picking the file
  // every single time. Re-pick only when the data actually changes.
  if(cache!==false){try{localStorage.setItem(DKEY,JSON.stringify(j));}catch(e){}}
  paint(); render();
  if(page!=='markers')renderPage(page);   // re-booted (fresh file) while on a data page
}

// Opened from disk, fetch() is blocked. So offer the file instead: pick it or drop it.
// No server, no host, no account. The JSON is just a file you keep.
function askForFile(err){
  document.getElementById('tbl').innerHTML=
    '<tbody><tr><td id="dz" style="padding:56px 20px;text-align:center;line-height:1.75;color:var(--t2)">'+
    '<b style="color:var(--txt);font-size:16px">Open bloodwork.js</b><br>'+
    '<span style="font-size:13px">Pick it from wherever you keep it.</span><br><br>'+
    // big tap target: this is the whole interaction on a phone
    '<label style="display:inline-block;min-width:200px;padding:15px 26px;border-radius:99px;'+
    'background:var(--sol);color:var(--sol-t);cursor:pointer;font-size:14px;font-weight:600;'+
    '-webkit-tap-highlight-color:transparent">'+
    'Choose file<input id="pick" type="file" style="display:none"></label>'+
    '<br><br><span style="color:var(--t4);font-size:11.5px;line-height:1.6">'+
    'On a laptop, keeping bloodwork.js in this folder loads it automatically.<br>'+
    'iOS previews each file alone, so it has to be picked.</span></td></tr></tbody>';
  const take=async f=>{ if(!f) return;
    try{
      let t=await f.text();
      const i=t.indexOf('{');                       // tolerate the window.BLOODWORK = wrapper
      if(i>0) t=t.slice(i).replace(/;\s*$/,'');
      boot(JSON.parse(t));
    }catch(e){ alert('That file is not valid bloodwork data\n\n'+e); } };
  document.getElementById('pick').addEventListener('change',e=>take(e.target.files[0]));
  ['dragover','drop'].forEach(t=>document.addEventListener(t,e=>e.preventDefault()));
  document.addEventListener('drop',e=>take(e.dataTransfer&&e.dataTransfer.files[0]));
}

async function load(){
  // theme: the DEVICE's scheme is the default; a saved manual flip overrides it
  let saved=null;
  try{if(window.storage){const r=await window.storage.get(TKEY);
    if(r&&(r.value==='dark'||r.value==='light'))saved=r.value;}}catch(e){}
  const sys=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
  themeChosen=!!saved;
  S.theme=saved||(sys&&sys.matches?'dark':'light');
  if(sys&&sys.addEventListener)sys.addEventListener('change',e=>{   // live: follow the OS until flipped
    if(themeChosen)return;
    S.theme=e.matches?'dark':'light';paint();});
  paint();
  // 1. bloodwork.js sitting next to this file. Works from DISK — no server, no CORS,
  //    because <script src> is not subject to the fetch() same-origin rule.
  if(window.BLOODWORK) return boot(window.BLOODWORK);
  // 2. a sandbox that refused to load the sibling script (iOS Quick Look sometimes does)
  try{ const c=localStorage.getItem(DKEY); if(c) return boot(JSON.parse(c),false); }catch(e){}
  // 3. nothing worked: ask for the file
  askForFile();
}

/* inline position gauge: clinical band, optimal band, your value */
function mini(m){
  const [a0,a1]=m.axis,sp=a1-a0||1;
  const P=x=>Math.max(0,Math.min(100,((x-a0)/sp)*100));
  const cl=P(m.clin[0]),cw=P(m.clin[1])-cl;
  const ol=m.opt?P(m.opt[0]):0,ow=m.opt?P(m.opt[1])-ol:0;
  const L=latest(m);
  const tick=L?`<div class="mgt ${status(m,L.v)}" style="left:${P(L.v)}%"></div>`:'';
  const lab=(x,v)=>{const p=P(x);const tf=p<9?'none':p>91?'translateX(-100%)':'translateX(-50%)';
    return `<span style="left:${p}%;transform:${tf}">${fmt(v)}</span>`;};
  const tip=`Clinical ${fmt(m.clin[0])}–${fmt(m.clin[1])} ${m.us}`+
    (m.opt?` · Optimal ${fmt(m.opt[0])}–${fmt(m.opt[1])} (${m.oc})`:'')+
    (L?` · You: ${fmt(L.v)}`:' · not measured');
  return `<div title="${tip}">
    <div class="mg"><div class="mgc" style="left:${cl}%;width:${cw}%"></div>
      ${m.opt?`<div class="mgo" style="left:${ol}%;width:${ow}%"></div>`:''}${tick}</div>
    <div class="mgx">${lab(m.clin[0],m.clin[0])}${lab(m.clin[1],m.clin[1])}</div></div>`;
}
function sev(m,v){
  const w=(m.clin[1]-m.clin[0])||1;                       // normalise by the marker's own range width
  if(v<m.clin[0])return 100+(m.clin[0]-v)/w;              // so mg/dL and mL/min are comparable
  if(v>m.clin[1])return 100+(v-m.clin[1])/w;
  if(m.opt){ if(v<m.opt[0])return (m.opt[0]-v)/w; if(v>m.opt[1])return (v-m.opt[1])/w; }
  return 0;
}
function excursion(m,v){                                   // how far past the edge, in the marker's own units
  if(v<m.clin[0])return `${fmt(m.clin[0]-v)} under`;
  if(v>m.clin[1])return `${fmt(v-m.clin[1])} over`;
  if(m.opt){ if(v<m.opt[0])return `${fmt(m.opt[0]-v)} below target`;
             if(v>m.opt[1])return `${fmt(v-m.opt[1])} above target`; }
  return '';
}
function trend(m){
  // latest vs the reading BEFORE it: "what moved since I last drew blood"
  const pts=chron().filter(d=>d.v[m.id]);
  if(pts.length<2)return '<span class="tnil">—</span>';
  const V=d=>toUS(m,d.v[m.id].r,d.v[m.id].u);
  const A=pts[pts.length-2],B=pts[pts.length-1],diff=V(B)-V(A);
  const yrs=(new Date(B.date+'T00:00:00')-new Date(A.date+'T00:00:00'))/31557600000;
  const lbl=Math.abs(diff)<1e-9?'no change':(diff>0?'↑':'↓')+' '+fmt(Math.abs(diff));
  const tip=`${fmt(V(A))} (${A.date}) → ${fmt(V(B))} (${B.date}) ${m.us}`;
  return `<div class="trw" title="${tip}"><span class="dlt">${lbl}</span>`+
    `<span class="tsp">${yrs>=1?fmt(yrs)+'y':Math.round(yrs*12)+'mo'}</span></div>`;
}

// re-measure the open chart's panes against the CURRENT column positions
function fitChart(){
  const d=document.querySelector('tr.det'); if(!d)return;
  const cy=d.querySelector('.cy'),cp=d.querySelector('.cpad');
  const t=document.getElementById('tbl'),h=t.tHead?[...t.tHead.rows[0].cells]:[];
  if(!cy||!cp||!h.length)return;
  const n=chron().length,first=5+(filter==='flag'?1:0),last=first+n-1;
  if(!h[first]||!h[last])return;
  const tb=t.getBoundingClientRect();
  cy.style.width=(h[first].getBoundingClientRect().left-tb.left)+'px';
  cp.style.width=(tb.right-h[last].getBoundingClientRect().right)+'px';
}

function det(row,id,cols,n,tri){
  const cur=document.querySelector('tr.det');
  if(cur&&openRow===row){                                // toggle shut THIS row
    const w=cur.querySelector('.dwrap');openRow=null;
    if(!w){cur.remove();return;}
    w.classList.remove('open');
    let done=false;const kill=()=>{if(!done){done=true;cur.remove();}};
    w.addEventListener('transitionend',e=>{if(e.target===w&&e.propertyName==='grid-template-rows')kill();});
    setTimeout(kill,420); return;
  }
  if(cur)cur.remove();
  openRow=row;
  const m=MARK.find(x=>x.id===id),ds=chron();
  const V=d=>toUS(m,d.v[m.id].r,d.v[m.id].u);
  const pts=ds.map((d,i)=>({i,d})).filter(o=>o.d.v[m.id]);

  // Y-AXIS: the lab reference range, widened only enough to contain the data.
  const vals=pts.map(o=>V(o.d));
  let lo=Math.min(m.clin[0],...vals),hi=Math.max(m.clin[1],...vals);
  const pd=((hi-lo)||1)*.12; lo-=pd; hi+=pd;
  const P=v=>((v-lo)/(hi-lo))*100;                      // % up from the bottom
  const X=i=>((i+.5)/n)*100;                            // dead centre of each draw column

  // y labels: clinical bounds always; optimal only where it will not collide
  let L=[[m.clin[1],''],[m.clin[0],'']];
  if(m.opt)[m.opt[1],m.opt[0]].forEach(v=>{
    if(L.every(([w])=>Math.abs(P(v)-P(w))>7))L.push([v,'o']);});
  const ylab=L.map(([v,c])=>`<div class="cyl ${c}" style="bottom:${P(v).toFixed(2)}%"><span>${fmt(v)}</span></div>`).join('');
  const grid=L.map(([v,c])=>`<div class="cgl ${c}" style="bottom:${P(v).toFixed(2)}%"></div>`).join('');
  const path=pts.map((o,k)=>`${k?'L':'M'}${X(o.i).toFixed(2)},${(100-P(V(o.d))).toFixed(2)}`).join(' ');
  const dots=pts.map(o=>`<div class="cd ${status(m,V(o.d))}" style="left:${X(o.i).toFixed(2)}%;bottom:${P(V(o.d)).toFixed(2)}%"`+
    ` title="${o.d.date} · ${fmt(V(o.d))} ${m.us}"></div>`).join('');
  // measure, don't assume: column widths change with the viewport, so the panes must follow
  const _t=document.getElementById('tbl'),_h=_t.tHead?[..._t.tHead.rows[0].cells]:[];
  const _first=5+(tri?1:0), _last=_first+n-1;       // first and last draw column
  const _tb=_t.getBoundingClientRect();
  const preW=_h[_first]?(_h[_first].getBoundingClientRect().left-_tb.left):634;
  const padW=_h[_last] ?(_tb.right-_h[_last].getBoundingClientRect().right):104;

  const box=`<tr class="det"><td colspan="${cols}"><div class="dwrap"><div class="dclip">
    <div class="chart">
      <div class="cy" style="width:${preW}px">
        <div class="ckey">
          <div class="cka ref">
            <div class="ckt" style="bottom:${P(m.clin[0]).toFixed(2)}%;height:${(P(m.clin[1])-P(m.clin[0])).toFixed(2)}%">
              <span class="ckl">Lab reference range</span><span class="ckbr"></span></div>
          </div>
          ${m.opt?`<div class="cka opt">
            <div class="ckt" style="bottom:${P(m.opt[0]).toFixed(2)}%;height:${(P(m.opt[1])-P(m.opt[0])).toFixed(2)}%">
              <span class="ckl">Optimal target<em class="${m.oc}">${m.oc}</em></span><span class="ckbr opt"></span></div>
          </div>`:''}
        </div>
        <div class="cyu">${m.us}</div>${ylab}</div>
      <div class="cplot">
        <div class="cb clin" style="bottom:${P(m.clin[0]).toFixed(2)}%;height:${(P(m.clin[1])-P(m.clin[0])).toFixed(2)}%"></div>
        ${m.opt?`<div class="cb opt" style="bottom:${P(m.opt[0]).toFixed(2)}%;height:${(P(m.opt[1])-P(m.opt[0])).toFixed(2)}%"></div>`:''}
        ${grid}
        ${pts.length>1?`<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${path}" fill="none"
          stroke="currentColor" stroke-width="1.6" vector-effect="non-scaling-stroke"
          stroke-linecap="round" stroke-linejoin="round" opacity=".8"/></svg>`:''}
        ${dots}
      </div>

const SRCH=document.getElementById('srch'),QI=document.getElementById('q'),TOP=document.getElementById('top');
function scrollToSec(sec){
  const el=document.getElementById('sec-'+sec),th=document.querySelector('thead th');
  if(!el||!th)return;
  // The header's rendered bottom, wherever it is pinned. Works for both scrollers.
  const headBottom=th.getBoundingClientRect().bottom;
  // (the tbody isn't sticky — only its cells are — so its rect is the true layout position)
  const barTop=el.getBoundingClientRect().top;
  window.scrollBy({top:barTop-headBottom+1,behavior:'smooth'});  // +1 tucks under, never a seam
}
function goto(cat){
  if(filter!=='all'||q){setF('all');requestAnimationFrame(()=>requestAnimationFrame(()=>scrollToSec(cat)));}
  else scrollToSec(cat);

// from a Stack row to the By-supplement group of markers it bears on
/* ---- pages ----
   'markers' is the whole table experience, filters and all. The other three render
   into #pages from the STACK / ROUTINE / DIET blocks, and the table-only controls
   fold away via html[data-page] (see the CSS). Nothing here touches table geometry. */
const PAGES={markers:'Markers',prescription:'Next Draw',stack:'Stack',routine:'Routine',diet:'Diet',training:'Training'};
let page='markers';
document.documentElement.dataset.page=page;
const PGEL=document.getElementById('pages'),
      PBTN=document.getElementById('pgbtn'),PTABS=document.getElementById('ptabs');
// reveal a clipped tab WITH a sliver of its neighbour, so hidden tabs announce
// themselves; a tab at either end reveals plainly. (.ptu after the last tab is
// not a .pt, so the guard treats the last tab as edge.)
function revealTab(b){
  const sc=PTABS,peek=28;
  const bl=b.offsetLeft,br=bl+b.offsetWidth;
  const nx=b.nextElementSibling,pv=b.previousElementSibling;
  const nb=nx&&nx.classList&&nx.classList.contains&&nx.classList.contains('pt')?peek:0;
  const pb=pv&&pv.classList&&pv.classList.contains&&pv.classList.contains('pt')?peek:0;
  let x=sc.scrollLeft;
  if(br+nb>x+sc.clientWidth)x=br+nb-sc.clientWidth;
  if(bl-pb<x)x=Math.max(0,bl-pb);
  // BIAS: keep a sliver of the LAST tab on-screen as a "there's more" hint,
  // as far as possible without pushing the ACTIVE tab off (it always wins)
  const tabs=sc.querySelectorAll('.pt'),first=tabs[0],last=tabs[tabs.length-1];
  if(last&&last!==b){
    const need=last.offsetLeft+peek-sc.clientWidth;
    const keepFirst=first.offsetLeft+first.offsetWidth-peek;   // Markers keeps a sliver too
    if(need>x)x=Math.max(x,Math.min(need,bl,keepFirst));
  }
  if(x!==sc.scrollLeft&&sc.scrollTo)sc.scrollTo({left:x,behavior:'smooth'});
}
function movePtu(){   // slide the shared underline under the active tab
  const on=PTABS.querySelector('.pt.on'),u=document.getElementById('ptu');
  if(!on||!u||!on.offsetWidth)return;   // hidden strip: keep the last position
  const pad=parseFloat(getComputedStyle(on).paddingLeft)||0;
  u.style.left=(on.offsetLeft+pad)+'px';
  u.style.width=Math.max(0,on.offsetWidth-2*pad)+'px';
}
// open = the tab strip stands in for the filter row; html[data-menu=open] drives ALL of it.
// The swap is choreographed: aria flips at TAP time (the icon reacts instantly), the bar
// fade-slides out, the content flips while invisible, and the same transition rides back in.
let menuOpen=false;
function pmSet(open){
  if(open===menuOpen)return;
  menuOpen=open;
  PBTN.setAttribute('aria-expanded',String(open));
  requestAnimationFrame(movePtu);   // the strip may have just become visible
  const apply=()=>{ if(open)document.documentElement.dataset.menu='open';
                    else delete document.documentElement.dataset.menu; };
  const B=document.getElementById('swap');
  if(!B||!B.animate||matchMedia('(prefers-reduced-motion: reduce)').matches){apply();return;}
  B.classList.add('swapping');
  clearTimeout(pmSet._t);
  pmSet._t=setTimeout(()=>{apply();B.classList.remove('swapping');},250);
}
function pmClose(){pmSet(false);}
function setPage(p){
  if(!PAGES[p])return;
  if(p===page){if(p==='markers')pmSet(false);return;}   // re-tapping Markers folds the strip
  page=p;
  document.documentElement.dataset.page=p;
  PGEL.hidden=p==='markers';
  document.querySelectorAll('#ptabs .pt').forEach(b=>{const on=b.dataset.pg===p;b.classList.toggle('on',on);
    if(on)revealTab(b);});   // a clipped tab slides fully into view, peeking its neighbour
  if(p!=='markers')renderPage(p);
  pmSet(p!=='markers');   // the strip PERSISTS on pages; only Markers swaps it back for filters
  // The topbar changes composition here (toc + pills vs tabs), so --toph must be
  // re-measured HERE. The ResizeObserver alone proved unreliable (unreferenced
  // observers can be GC'd), and a stale --toph leaves a phantom gap under the bar.
  requestAnimationFrame(()=>{setTop();movePtu();});
  setTimeout(()=>setTop(),400);   // again once the .34s strip swap has settled
  window.scrollTo({top:0});
}
function renderPage(p){
  // an exercise renders as a gridless set table: one column per set, kg over reps.
  // Long protocol details hide behind an info tip so the cards stay narrow.
  const exRow=x=>{
    if(typeof x==='string')return `<li>${esc(x).replace(/\n/g,'<br>')}</li>`;
    // uniform weight AND reps (the usual case) collapse to ONE line on the name:
    // "40kg - 3x5". Uniform weight with mixed reps keeps a reps row; mixed weights
    // keep the full per-set kg/reps columns.
    const uniW=x.sets&&x.sets.length&&new Set(x.sets.map(s=>String(s[0]))).size===1;
    const uniR=x.sets&&x.sets.length&&new Set(x.sets.map(s=>String(s[1]))).size===1;
    let kgTag='',sets='';
    if(x.sets&&x.sets.length){
      if(uniW&&uniR){
        const kg=x.sets[0][0];
        kgTag=`<span class="exkg"><span class="k">${kg!=null?esc(String(kg))+'kg':''}</span>`+
              `<span class="d">${kg!=null?'-':''}</span>`+
              `<span class="r">${x.sets.length}&times;${esc(String(x.sets[0][1]))}</span></span>`;
      }else if(uniW){
        if(x.sets[0][0]!=null)kgTag=`<span class="exkg"><span class="k">${esc(String(x.sets[0][0]))}kg</span></span>`;
        sets=`<div class="exsets">`+x.sets.map(s=>`<span class="exset"><b>${esc(String(s[1]))}</b></span>`).join('')+`</div>`;
      }else{
        sets=`<div class="exsets">`+x.sets.map(s=>`<span class="exset"><i>${s[0]==null?'&mdash;':esc(String(s[0]))+'kg'}</i><b>${esc(String(s[1]))}</b></span>`).join('')+`</div>`;
      }
    }
    const tip=x.info?`<button class="infob" title="${esc(x.info)}" aria-label="Details"
      onclick="tip(this)">i</button>`:'';
    const detail=x.info?`<div class="exinfo">${esc(x.info)}</div>`:'';
    return `<li><div class="exn"><span class="exnm">${esc(x.n)}${tip}</span>${kgTag}</div>${detail}${sets}</li>`;};
  const cardRow=(list,cls)=>!list.length?'':`<div class="care${cls?' '+cls:''}">`+list.map(c=>{
    const inner=c.groups
      ?c.groups.map(g=>`<div class="cgrp">${esc(g.t)}</div><ul>${g.items.map(exRow).join('')}</ul>`).join('')
      :(c.items.length?`<ul>${c.items.map(exRow).join('')}</ul>`:`<div class="cempty">&mdash;</div>`);
    return `<div class="ccard"><b>${esc(c.t)}</b>${inner}</div>`;}).join('')+`</div>`;
  // the info bubble floats over its row (card exercise or stack item); a tap
  // anywhere outside it closes it. NOT bare '.open' — the search box uses it too.
  window.tip=b=>{const li=b.closest('li,.srow'),was=li.classList.contains('open');
    document.querySelectorAll('.ccard li.open,.srow.open').forEach(x=>x.classList.remove('open'));
    if(!was)li.classList.add('open')};
  document.addEventListener('click',e=>{
    if(e.target.closest&&e.target.closest('.infob,.exinfo'))return;
    document.querySelectorAll('.ccard li.open,.srow.open').forEach(x=>x.classList.remove('open'))});
  let h='';
  if(p==='prescription'&&PRESCRIPTION){
    const it=PRESCRIPTION.items;
    h=`<div class="pgh">Next draw</div><div class="pgsub">${it.length} biomarker${it.length===1?'':'s'} to collect</div>`+
      (it.length
        ?`<div class="pgsec">`+it.map(x=>`<div class="srow"><span class="sn">${esc(x)}</span></div>`).join('')+`</div>`
        :`<div class="cempty">&mdash;</div>`);
  } else if(p==='stack'&&STACK){
    h=`<div class="pgh">Supplement stack</div><div class="pgsub">${STACK.items.length} listed</div>`;
    STACK.cats.forEach(c=>{
      const items=STACK.items.filter(s=>s.cat===c.id);
      if(!items.length)return;
      h+=`<div class="pgsec${c.t?'':' nohead'}">`+
        (c.t?`<div class="pgst">${esc(c.t)}<small>${items.length} item${items.length>1?'s':''}</small></div>`:'')+
        (c.note?`<div class="cnote">${esc(c.note)}</div>`:'')+
        items.map(s=>{
          const dead=s.status==='stopped'||s.status==='dropped';
          return `<div class="srow${dead?' off':''}">`+
            `<span class="sn">${esc(s.name)}</span>`+
            (s.dose?`<span class="sd">${esc(s.dose)}</span>`:'')+   // no status badges: the sections carry it
            (s.info?`<span class="tipw"><button class="infob" title="${esc(s.info)}" aria-label="Details" onclick="tip(this)">i</button>`+
                    `<div class="exinfo">${esc(s.info)}</div></span>`:'')+
            `<span class="sfill"></span>`+
            (s.url?`<a class="slink" href="${esc(s.url)}" target="_blank" rel="noopener">buy &#8599;</a>`:'')+
          `</div>`;}).join('')+`</div>`;
    });
  } else if(p==='routine'&&ROUTINE.length){
    // an hour RULER, not a list: every hour from wake to lights-out gets a mark, so empty
    // hours take up (a little) space and the day reads as time, not as glued-together events
    const H0=parseInt(ROUTINE[0].t),H1=parseInt(ROUTINE[ROUTINE.length-1].t);
    // block boundaries earn the LONG tics; every other hour gets a subtle one
    const lt=new Set();
    ROUTINE.forEach(r=>{if(r.until){lt.add(parseInt(r.t));lt.add(parseInt(r.until));}});
    lt.add(H0);   // the day's start earns a boundary line too
    // a boundary line is REDUNDANT when the hour before it already ended mid-hour
    // with its own cut (lunch ends 12:30 -> no 13:00 line; the shower runs to 18:00
    // exactly, so 18:00 keeps its line)
    const supr=new Set();
    {let hh=H0;const mm=t=>parseInt(t.slice(3),10)/60;
     while(hh<=H1){const e2=ROUTINE.filter(r=>parseInt(r.t)===hh);
       const b2=e2.length===1&&e2[0].until&&parseInt(e2[0].until)>hh?e2[0]:null;
       if(b2){hh=Math.min(parseInt(b2.until),H1+1);continue;}
       const em2=e2.map(r=>{if(!r.until)return null;const uh=parseInt(r.until);
         return uh===hh?mm(r.until):(uh===hh+1&&mm(r.until)===0?1:null);});
       if(e2.length&&em2.every(x=>x!=null)&&Math.max(...em2)<1)supr.add(hh+1);
       hh++;}}
    const mark=hh=>`<i class="rhl${lt.has(hh)&&!supr.has(hh)?' lt':''}">${String(hh).padStart(2,'0')}:00</i>`;
    h=`<div class="pgh">Daily routine</div><div class="pgsub">`+
      `${ROUTINE[ROUTINE.length-1].t} &rarr; ${ROUTINE[0].t} · ${24-(H1-H0)}h bed time<br>`+
      `${ROUTINE[0].t} &rarr; ${ROUTINE[ROUTINE.length-1].t} · ${H1-H0}h wake time</div>`;
    let hr=H0;
    while(hr<=H1){
      const evs=ROUTINE.filter(r=>parseInt(r.t)===hr);
      // a multi-hour BLOCK (gym, work) swallows its interior hours: their rail marks stack
      // beside it, so its height stays proportional to time — no box, just the tics.
      // A block ending within its own hour renders as a plain row (endH===hr never advances).
      const block=evs.length===1&&evs[0].until&&parseInt(evs[0].until)>hr?evs[0]:null;
      if(block){
        const endH=Math.min(parseInt(block.until),H1+1),span=Math.max(1,endH-hr);
        const labels=Array.from({length:span},(_,i)=>mark(hr+i)).join('');
        h+=`<div class="rhr rblockrow"><span class="rht">${labels}</span><div class="rcell">`+
           `<div class="rev"><div class="rbody"><div class="rdo">${esc(block.do)}</div></div></div></div></div>`;
        hr=endH;continue;
      }
      // SUB-HOUR TRUTH: when every event in the hour declares a span that ends inside
      // it (or exactly on the next hour), each event sits at its actual minutes and
      // the fractional boundaries (12:30, 17:30) get their own hairlines.
      const mins=t=>parseInt(t.slice(3),10)/60;
      const spans=evs.map(r=>{let em=null;
        if(r.until){const uh=parseInt(r.until);
          em=uh===hr?mins(r.until):(uh===hr+1&&mins(r.until)===0?1:null);}
        return {sm:mins(r.t),em};});
      const prop=evs.length>0&&spans.every(x=>x.em!=null);
      // a cut is drawn only where a span ends into EMPTY time: a boundary that is both
      // one event's end and the next one's start needs no line — the texts separate
      const st2=new Set(spans.map(x=>x.sm)),en2=new Set(spans.map(x=>x.em));
      const cuts=prop?[...new Set(spans.flatMap(x=>[x.sm,x.em])
        .filter(f=>f>0&&f<1&&!(st2.has(f)&&en2.has(f))))]:[];
      h+=`<div class="rhr${evs.length?'':' rempty'}${evs.length>1?' multi':''}${hr===H1?' rlast':''}${prop?' rprop':''}">`+
        `<span class="rht">${mark(hr)}</span>`+
        cuts.map(f=>`<i class="rln" style="top:calc(var(--hh)*${f} + 7px)"></i>`).join('')+
        `<div class="rcell">`+

          let sup='';
          if(r.slot&&STACK){
            const list=STACK.items.filter(s=>s.status==='taking'&&s.when===r.slot);

          }
          const pos=prop?` style="top:calc(var(--hh)*${(spans[i].sm+spans[i].em)/2} - ${spans[i].sm>0?7:6}px)"`:'';
          return `<div class="rev"${pos}><div class="rbody"><div class="rdo">${esc(r.do).replace(/\n/g,'<br>')}</div>${sup}</div></div>`;
        }).join('')+`</div></div>`;
      hr++;
    }
    h+=cardRow(CARE.filter(c=>!c.top),'wide');   // the protocol cards close the page
  } else if(p==='training'&&TRAINING&&TRAINING.cards&&TRAINING.cards.length){
    h=`<div class="pgh">Training</div>`+
      (TRAINING.cardio?`<div class="pgst">Cardio</div><div class="cnote lead">${esc(TRAINING.cardio).replace(/\n/g,'<br>')}</div>`:'')+
      `<div class="pgst">Resistance</div><div class="pgsub pgsp">${TRAINING.cards.map(c=>esc(c.t)).join(' · ')}</div>`+
      (TRAINING.note?`<div class="cnote lead">${esc(TRAINING.note)}</div>`:'')+
      cardRow(TRAINING.cards);
  } else if(p==='diet'&&DIET){
    // meal supp lists DERIVE from STACK.when (taking + planned): one source of truth
    const supps=slot=>{
      const list=STACK?STACK.items.filter(x=>x.when===slot&&(x.status==='taking'||x.status==='planned')):[];
      return list.length
        ?`<ul>${list.map(x=>`<li>${esc(x.name)}${x.dose?`<span class="cwhen">${esc(x.dose)}</span>`:''}</li>`).join('')}</ul>`
        :`<div class="cempty">&mdash;</div>`;
    };
    h=`<div class="pgh">Diet</div><div class="pgsub">${DIET.meals.length} meals a day</div>`+
      `<div class="care col">`+DIET.meals.map(m=>
        `<div class="ccard"><b>${esc(m.t)}</b>${m.at?`<span class="cwhen">${esc(m.at)}</span>`:''}`+
        `<ul>${m.items.map(x=>x==='---'?'<li class="crs" aria-hidden="true"></li>':`<li>${esc(x)}</li>`).join('')}</ul>`+
        `<div class="cgrp">Supplements</div>`+supps(m.id)+`</div>`).join('')+
      `<div class="ccard"><b>Evening</b><div class="cgrp">Supplements</div>`+supps('evening')+`</div>`+
      `</div>`;
    if(DIET.notes&&DIET.notes.length)
      h+=`<div class="dnotes"><b>NOTES</b><ul>${DIET.notes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
  }
  PGEL.innerHTML=h||`<div class="pgh">${esc(PAGES[p]||p)}</div><div class="pgsub">No data block in bloodwork.js yet.</div>`;
}
PBTN.addEventListener('click',e=>{e.stopPropagation();
  if(page!=='markers')setPage('markers');            // the X on a page = back to the table
  else pmSet(!menuOpen);});
document.addEventListener('click',e=>{               // outside-click folds it on Markers only
  if(menuOpen&&page==='markers'&&!(e.target.closest&&e.target.closest('.pgnav,.ptabs')))pmClose();});

const TB=document.getElementById('topbar'),WRAP=document.querySelector('.wrap');
const R0=document.documentElement.style;
const setGut=()=>{                                   // left margin of the content column
  const pl=parseFloat(getComputedStyle(WRAP).paddingLeft)||0;
  R0.setProperty('--gut',(WRAP.offsetLeft+pl)+'px');
};
const setTop=()=>{
  R0.setProperty('--toph',TB.getBoundingClientRect().height+'px');      // sub-pixel, not offsetHeight
  // --thh is NOT measured. `thead th{height:var(--thh)}` sizes the header FROM it, so measuring
  // it back would be circular, and any drift opens a gap the frozen cells shine through.
};
setGut(); setTop();
let tbRO;   // hold the reference: an unreferenced ResizeObserver is GC-bait (Safari)
if(window.ResizeObserver){tbRO=new ResizeObserver(setTop);tbRO.observe(TB);}
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>{setTop();setGut();});
let _stuck=false;
// The frozen marker column narrows PROGRESSIVELY as you scroll sideways: 164px -> 112px
// over the first 150px of travel. Tied to scroll position, not a threshold, so it tracks
// your thumb. rAF-throttled, because changing a column width relayouts the table.
const NM_WIDE=164, NM_NARROW=78, NM_TRAVEL=170;
let _rafx=0, _lastW=-1;
function setNmW(){
  _rafx=0;
  const t=Math.min(Math.max(window.scrollX,0)/NM_TRAVEL,1);
  const e=t*t*(3-2*t);                                  // smoothstep: eases in and out
  const w=Math.round(NM_WIDE+(NM_NARROW-NM_WIDE)*e);
  if(w!==_lastW){
    _lastW=w;
    R0.setProperty('--nmw',w+'px');      // skip the relayout if unchanged
    fitChart();                          // the draw columns just moved; the chart must follow
  }
}
window.addEventListener('scroll',()=>{
  const s=window.scrollY>12;
  if(s!==_stuck){_stuck=s;TB.classList.toggle('stuck',s);}
  TOP.classList.toggle('on',window.scrollY>420);
  if(!_rafx)_rafx=requestAnimationFrame(setNmW);
},{passive:true});
setNmW();
window.addEventListener('resize',()=>{setTop();setGut();fitChart();movePtu();},{passive:true});
TOP.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
function onQ(v){qRaw=v.trim();q=norm(qRaw);SRCH.classList.toggle('has',!!q);render();}
function sShut(){SRCH.classList.remove('open','has');QI.value='';QI.blur();if(q)onQ('');}
function setF(f){filter=f;
  if(q){QI.value='';q='';qRaw='';SRCH.classList.remove('has');}
  render();}
QI.addEventListener('focus',()=>SRCH.classList.add('open'));
QI.addEventListener('input',e=>onQ(e.target.value));
QI.addEventListener('blur',()=>setTimeout(()=>{               // let a click on the × land first
  if(!q&&document.activeElement!==QI)SRCH.classList.remove('open');},150));
document.getElementById('sbtn').addEventListener('click',()=>{
  if(SRCH.classList.contains('open')&&!q)sShut(); else QI.focus();});
document.getElementById('qx').addEventListener('click',()=>{QI.value='';onQ('');QI.focus();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&menuOpen&&page==='markers')pmClose();
  else if(e.key==='Escape'&&SRCH.classList.contains('open'))sShut();
  else if(e.key==='/'&&document.activeElement!==QI&&page==='markers'){e.preventDefault();QI.focus();}});
QI.placeholder='Search markers…';

// Toggling a row open then shut lands two clicks in the same spot: the browser reads that
// as a double-click and selects the word under the cursor. Suppress the selection on the
// 2nd+ click only, so a deliberate drag-select can still copy a value.
// Shift-click the search button to forget the cached data and load a fresh file.
document.getElementById('sbtn').addEventListener('click',e=>{
  if(!e.shiftKey)return;
  e.stopImmediatePropagation();
  try{localStorage.removeItem(DKEY);}catch(x){}
  askForFile();
},true);

document.getElementById('tbl').addEventListener('mousedown',e=>{
  if(e.detail>1&&e.target.closest&&e.target.closest('tr.m'))e.preventDefault();
});

load();
</script>
